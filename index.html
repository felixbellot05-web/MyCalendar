<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calendar</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendar">
<meta name="theme-color" content="#0d0d0d">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d0d0d'/><rect x='15' y='25' width='70' height='60' rx='8' fill='none' stroke='%23a855f7' stroke-width='4'/><line x1='15' y1='42' x2='85' y2='42' stroke='%23a855f7' stroke-width='3'/><rect x='30' y='18' width='8' height='16' rx='4' fill='%23a855f7'/><rect x='62' y='18' width='8' height='16' rx='4' fill='%23a855f7'/><rect x='25' y='52' width='12' height='10' rx='3' fill='%2322c55e'/><rect x='44' y='52' width='12' height='10' rx='3' fill='%23f97316'/><rect x='63' y='52' width='12' height='10' rx='3' fill='%2314b8a6'/><rect x='25' y='68' width='12' height='10' rx='3' fill='%23a855f7'/></svg>">
<link id="pwa-manifest" rel="manifest">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#0d0d0d; --sf:#161616; --sf2:#1f1f1f; --sf3:#2a2a2a;
  --bd:#2e2e2e; --tx:#f0f0f0; --tx2:#888; --tx3:#555;
  --r:9px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --cell-h:72px;
}

html{height:100%;background:#0d0d0d}

body{
  background:var(--bg); color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100%; display:flex; flex-direction:column; overflow:hidden;
  user-select:none;
  padding-left:var(--safe-l); padding-right:var(--safe-r);
  padding-bottom:calc(72px + var(--safe-bot));
}

/* ── TOP BAR ── */
#topbar{
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  padding:max(12px,calc(var(--safe-top)+8px)) 16px 10px;
  background:var(--sf); border-bottom:1px solid var(--bd); flex-shrink:0;
}
#nav-group{display:flex;align-items:center;gap:8px}
#nav-title{font-size:1rem;font-weight:700;min-width:160px;text-align:center;letter-spacing:-.01em}
.nav-btn{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  cursor:pointer;border-radius:7px;padding:4px 11px;font-size:.95rem;line-height:1.5;
  transition:background .15s;
}
.nav-btn:hover{background:var(--sf3)}
#today-btn{font-size:.72rem;font-weight:700;padding:4px 11px}

#view-switcher{
  display:flex;background:var(--sf2);border:1px solid var(--bd);border-radius:7px;overflow:hidden
}
.view-btn{
  background:none;border:none;color:var(--tx2);cursor:pointer;
  padding:4px 12px;font-size:.75rem;font-weight:700;transition:background .15s,color .15s
}
.view-btn.active{background:var(--sf3);color:var(--tx)}
.view-btn:hover:not(.active){color:var(--tx)}

#settings-btn{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);
  cursor:pointer;border-radius:7px;padding:5px 9px;display:flex;align-items:center;
  transition:color .15s,background .15s
}
#settings-btn:hover{color:var(--tx);background:var(--sf3)}

/* ── CALENDAR CONTAINER ── */
#calendar-container{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}

/* ── MONTH VIEW ── */
#month-view{display:flex;flex-direction:column;height:100%}

/* sticky day-of-week header */
#dow-header{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:8px 10px 5px;flex-shrink:0;
}
.dow-cell{
  text-align:center;font-size:.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--tx3)
}

/* continuous scroll container */
#month-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 10px 16px;
  scrollbar-width:thin;scrollbar-color:var(--sf3) transparent}

.month-section{margin-bottom:12px}
.month-section-title{
  font-size:.78rem;font-weight:700;color:var(--tx2);
  padding:8px 2px 5px;letter-spacing:.02em;
  position:sticky;top:0;background:var(--bg);z-index:10
}
.month-section-title.current-month{color:var(--tx)}

.month-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px
}

/* FIX #2: fixed cell height — never grows */
.day-cell{
  height:var(--cell-h);
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
  padding:4px 4px 3px;
  display:flex;flex-direction:column;
  overflow:hidden;          /* content clips — never expands cell */
  cursor:pointer;position:relative;z-index:1;
  transition:border-color .15s,background .15s
}
.day-cell:hover{border-color:#444;background:var(--sf2)}
.day-cell.other-month{opacity:.35}
.day-cell.today{border-color:#3a3a3a}
.day-cell.today .day-num{
  background:var(--tx);color:var(--bg);border-radius:50%;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:700
}
.day-num{
  font-size:.7rem;font-weight:500;color:var(--tx2);
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0
}

/* Single-day event pill */
.event-pill{
  border-radius:3px;padding:1px 4px;
  font-size:.58rem;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;opacity:.9;flex-shrink:0;margin-top:1px
}
.event-pill:hover{opacity:1}

/* Multi-day spanning bar */
.event-span{
  height:14px;font-size:.57rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;opacity:.95;flex-shrink:0;
  display:flex;align-items:center;padding:0 4px;
  margin-top:1px;
  /* middle: bleed both sides */
  border-radius:0;margin-left:-7px;margin-right:-7px
}
.event-span.span-start {border-radius:7px 0 0 7px;margin-left:2px;margin-right:-7px}
.event-span.span-end   {border-radius:0 7px 7px 0;margin-left:-7px;margin-right:2px}
.event-span.span-single{border-radius:7px;margin-left:2px;margin-right:2px}
.event-span:hover{opacity:1;filter:brightness(1.15)}

.more-badge{font-size:.52rem;color:var(--tx3);padding:0 3px;margin-top:1px;flex-shrink:0}

/* ── WEEK VIEW ── */
#week-view{display:flex;flex-direction:column;height:100%;padding:0 10px 0}
#week-header{
  display:grid;grid-template-columns:44px repeat(7,1fr);
  padding:8px 0 7px;border-bottom:1px solid var(--bd);flex-shrink:0
}
.wdh{text-align:center}
.wdh .wdn{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);font-weight:700}
.wdh .wdd{font-size:.95rem;font-weight:600;color:var(--tx);margin-top:1px}
.wdh.today .wdd{
  background:var(--tx);color:var(--bg);border-radius:50%;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:1px auto 0
}
#week-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--sf3) transparent}
#week-grid{display:grid;grid-template-columns:44px repeat(7,1fr);position:relative}
.tlbl{
  font-size:.58rem;color:var(--tx3);text-align:right;padding-right:8px;height:44px;
  display:flex;align-items:flex-start;justify-content:flex-end;margin-top:-6px
}
.wslot{
  height:44px;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);
  position:relative;cursor:pointer;transition:background .1s
}
.wslot:hover{background:var(--sf2)}
.wev{
  position:absolute;left:2px;right:2px;border-radius:4px;
  padding:2px 4px;font-size:.62rem;font-weight:600;
  overflow:hidden;cursor:pointer;z-index:2;line-height:1.25
}

/* ── DAY VIEW ── */
#day-view{display:flex;flex-direction:column;height:100%;padding:0 10px 0}
#day-hdr{padding:10px 0 8px 44px;border-bottom:1px solid var(--bd);flex-shrink:0}
#day-hdr .dbig{font-size:1.2rem;font-weight:700}
#day-hdr .dsub{font-size:.75rem;color:var(--tx2);margin-top:2px}
#day-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--sf3) transparent}
#day-grid{display:grid;grid-template-columns:44px 1fr;position:relative}
.dslot{height:44px;border-bottom:1px solid var(--bd);position:relative;cursor:pointer;transition:background .1s}
.dslot:hover{background:var(--sf2)}
.dev{
  position:absolute;left:3px;right:3px;border-radius:5px;
  padding:2px 7px;font-size:.7rem;font-weight:600;overflow:hidden;cursor:pointer;z-index:2
}

/* ── MIC BUTTON ── */
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(72px + var(--safe-bot));
  background:var(--sf);border-top:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  padding-bottom:var(--safe-bot);
  padding-left:var(--safe-l);
  padding-right:var(--safe-r);
  z-index:9999;
}
#mic-area{
  display:flex;flex-direction:column-reverse;align-items:center;gap:8px;
  pointer-events:none
}
#transcript-bubble{
  background:var(--sf2);border:1px solid var(--bd);border-radius:18px;padding:7px 16px;
  font-size:.77rem;color:var(--tx2);max-width:300px;text-align:center;
  display:none;animation:fadeUp .2s;pointer-events:none
}
#transcript-bubble.visible{display:block}
#mic-btn{
  width:56px;height:56px;border-radius:50%;
  background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx2);
  cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 4px 24px rgba(0,0,0,.7);
  pointer-events:auto
}
#mic-btn svg{transition:color .2s}
#mic-btn:hover{border-color:#555;color:var(--tx);transform:scale(1.06)}
#mic-btn.listening{background:rgba(229,57,53,.12);border-color:#e53935;animation:pMic 1.4s infinite}
#mic-btn.listening svg{color:#e53935}
#mic-btn.listening::after{
  content:'';position:absolute;width:66px;height:66px;border-radius:50%;
  border:2px solid rgba(229,57,53,.3);animation:pMic 1.4s infinite;pointer-events:none
}
@keyframes pMic{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.3)}50%{box-shadow:0 0 0 12px rgba(229,57,53,0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:200;display:flex;align-items:center;justify-content:center;
  animation:fadeUp .15s;padding:16px
}
.overlay.hidden{display:none}
.modal{
  background:var(--sf);border:1px solid var(--bd);border-radius:14px;
  padding:24px 20px;width:100%;max-width:390px;animation:slideUp .2s;position:relative
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-size:.9rem;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{
  display:block;font-size:.65rem;color:var(--tx2);font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px
}
.fg input,.fg select{
  width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  border-radius:7px;padding:7px 10px;font-size:.85rem;outline:none;
  transition:border-color .15s;font-family:inherit
}
.fg input:focus,.fg select:focus{border-color:#555}
.fg select option{background:var(--sf2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.allday-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.allday-row label{font-size:.82rem;color:var(--tx2);cursor:pointer}
.allday-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--tx);cursor:pointer}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:8px}
.btn{
  border:none;border-radius:8px;padding:8px 16px;
  font-size:.8rem;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit
}
.btn:hover{opacity:.85}
.btn-primary{background:var(--tx);color:var(--bg)}
.btn-ghost{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}
.btn-danger{background:rgba(229,57,53,.12);color:#e57373;border:1px solid rgba(229,57,53,.2)}
.close-btn{
  position:absolute;top:12px;right:12px;
  background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.95rem;padding:4px;line-height:1;
  transition:color .15s
}
.close-btn:hover{color:var(--tx2)}

/* ── SETTINGS PANEL ── */
#settings-panel{
  position:fixed;top:0;right:0;height:100vh;width:290px;
  background:var(--sf);border-left:1px solid var(--bd);z-index:300;
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
  padding:max(22px,calc(var(--safe-top)+14px)) 22px 22px
}
#settings-panel.open{transform:translateX(0)}
#settings-panel h3{font-size:.9rem;font-weight:700;margin-bottom:4px}
#settings-panel .ssub{font-size:.7rem;color:var(--tx3);margin-bottom:20px}
.stitle{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);font-weight:700;margin-bottom:10px}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.cat-swatch{
  width:28px;height:28px;border-radius:6px;cursor:pointer;
  position:relative;overflow:hidden;flex-shrink:0;transition:transform .15s
}
.cat-swatch:hover{transform:scale(1.1)}
.cat-swatch input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cat-ni{
  flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  border-radius:5px;padding:5px 8px;font-size:.8rem;outline:none;font-family:inherit
}
.cat-ni:focus{border-color:#555}
#settings-close{
  margin-top:auto;background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);
  border-radius:7px;padding:8px;cursor:pointer;font-size:.8rem;font-weight:600;
  transition:color .15s;font-family:inherit
}
#settings-close:hover{color:var(--tx)}
.sdiv{border:none;border-top:1px solid var(--bd);margin:16px 0}

/* ── TIME LINE ── */
.now-line{position:absolute;left:0;right:0;height:2px;background:#e53935;z-index:5;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:#e53935;border-radius:50%}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:3px}

.hidden{display:none!important}

/* ── MOBILE ── */
@media(max-width:430px){
  :root{--cell-h:60px}
  #nav-title{font-size:.88rem;min-width:120px}
  .view-btn{padding:4px 8px;font-size:.68rem}
  #month-scroll{padding:0 5px 80px}
  .day-cell{padding:3px 3px 2px}
  .day-num{font-size:.62rem;width:18px;height:18px}
  .event-pill{font-size:.52rem;padding:1px 3px}
  .event-span{font-size:.5rem;height:12px}
  .modal{padding:18px 14px}
  #settings-panel{width:100%}
  .tlbl{font-size:.52rem;padding-right:5px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="nav-group">
    <button class="nav-btn" id="prev-btn">‹</button>
    <button class="nav-btn" id="today-btn">Today</button>
    <button class="nav-btn" id="next-btn">›</button>
    <span id="nav-title"></span>
  </div>
  <div id="view-switcher">
    <button class="view-btn" data-view="month">Month</button>
    <button class="view-btn" data-view="week">Week</button>
    <button class="view-btn" data-view="day">Day</button>
  </div>
  <div>
    <button id="settings-btn" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<!-- VIEWS -->
<div id="calendar-container">

  <!-- MONTH VIEW: FIX #3 continuous scroll -->
  <div id="month-view">
    <div id="dow-header">
      <div class="dow-cell">Sun</div><div class="dow-cell">Mon</div>
      <div class="dow-cell">Tue</div><div class="dow-cell">Wed</div>
      <div class="dow-cell">Thu</div><div class="dow-cell">Fri</div>
      <div class="dow-cell">Sat</div>
    </div>
    <div id="month-scroll"></div>
  </div>

  <!-- WEEK VIEW -->
  <div id="week-view" class="hidden">
    <div id="week-header"><div></div></div>
    <div id="week-body"><div id="week-grid"></div></div>
  </div>

  <!-- DAY VIEW -->
  <div id="day-view" class="hidden">
    <div id="day-hdr">
      <div class="dbig" id="day-big"></div>
      <div class="dsub" id="day-sub"></div>
    </div>
    <div id="day-body"><div id="day-grid"></div></div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div id="mic-area">
    <div id="transcript-bubble"></div>
    <button id="mic-btn" title="Tap to add event by voice">
      <svg id="mic-icon" width="21" height="21" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </button>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="overlay hidden" id="event-overlay">
  <div class="modal">
    <button class="close-btn" id="ev-close">✕</button>
    <h2 id="modal-title">New Event</h2>
    <div class="fg"><label>Title</label><input type="text" id="ev-title" placeholder="Event name…"></div>
    <div class="fg"><label>Category</label><select id="ev-cat"></select></div>
    <div class="frow">
      <div class="fg"><label>Start date</label><input type="date" id="ev-date"></div>
      <div class="fg"><label>End date</label><input type="date" id="ev-enddate"></div>
    </div>
    <div class="allday-row">
      <input type="checkbox" id="ev-allday"><label for="ev-allday">All day</label>
    </div>
    <div class="frow" id="time-fields">
      <div class="fg"><label>Start time</label><input type="time" id="ev-start"></div>
      <div class="fg"><label>End time</label><input type="time" id="ev-end"></div>
    </div>
    <div class="modal-actions">
      <div><button class="btn btn-danger hidden" id="ev-del">Delete</button></div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-ghost" id="ev-cancel">Cancel</button>
        <button class="btn btn-primary" id="ev-save">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-panel">
  <h3>Settings</h3>
  <p class="ssub">Tap a swatch to change colour</p>
  <div class="stitle">Categories</div>
  <div id="cat-list"></div>
  <hr class="sdiv">
  <button id="settings-close">Close</button>
</div>

<script>
// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

// Comprehensive multilingual month map (EN + DE + FR + NL + LU)
const MONTH_MAP = {
  // English
  january:0,february:1,march:2,april:3,may:4,june:5,
  july:6,august:7,september:8,october:9,november:10,december:11,

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let state = {
  view:'month', cursor:new Date(),
  events:[],
  categories:{
    personal:{name:'Personal',color:'#22c55e'},
    health:  {name:'Health',  color:'#f97316'},

  },

// ═══════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════
function save(){
  localStorage.setItem('cal_ev', JSON.stringify(state.events));
  localStorage.setItem('cal_ca', JSON.stringify(state.categories));
}
function load(){
  try{
    const e=localStorage.getItem('cal_ev'), c=localStorage.getItem('cal_ca');
    if(e) state.events=JSON.parse(e);
    if(c) state.categories=JSON.parse(c);
  }catch(_){}
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function tdk(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function pld(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function todayKey(){ return tdk(new Date()); }
function rgba(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function cc(id){ return (state.categories[id]||Object.values(state.categories)[0]).color; }

function eventsOn(key){
  return state.events.filter(e=>{
    if(e.endDate&&e.endDate>e.date) return e.date<=key&&key<=e.endDate;
    return e.date===key;
  }).sort((a,b)=>{
    const as=a.endDate&&a.endDate>a.date, bs=b.endDate&&b.endDate>b.date;
    if(as&&!bs)return -1; if(!as&&bs)return 1;
    if(a.allDay&&!b.allDay)return -1; if(!a.allDay&&b.allDay)return 1;
    return(a.start||'').localeCompare(b.start||'');
  });
}

function applyColors(){
  for(const[id,c] of Object.entries(state.categories))
    document.documentElement.style.setProperty(`--cat-${id}`,c.color);
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  applyColors(); updateNavTitle(); updateViewBtns();
  if(state.view==='month') renderMonth();
  else if(state.view==='week') renderWeek();
  else renderDay();
}

function updateNavTitle(){
  const c=state.cursor;
  if(state.view==='month'){
    document.getElementById('nav-title').textContent=`${MONTHS[c.getMonth()]} ${c.getFullYear()}`;
  } else if(state.view==='week'){
    const sun=weekStart(c), sat=new Date(sun); sat.setDate(sat.getDate()+6);
    document.getElementById('nav-title').textContent=
      sun.getMonth()===sat.getMonth()
        ?`${MONTHS[sun.getMonth()]} ${sun.getDate()}–${sat.getDate()}, ${sun.getFullYear()}`
        :`${MONTHS[sun.getMonth()].slice(0,3)} ${sun.getDate()} – ${MONTHS[sat.getMonth()].slice(0,3)} ${sat.getDate()}`;
  } else {
    document.getElementById('nav-title').textContent=
      `${DAYS[c.getDay()]}, ${MONTHS[c.getMonth()]} ${c.getDate()}`;
  }
}

function updateViewBtns(){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));
  ['month','week','day'].forEach(v=>document.getElementById(`${v}-view`).classList.toggle('hidden',state.view!==v));
}

// ═══════════════════════════════════════════
//  MONTH VIEW — continuous scroll (Fix #3)
// ═══════════════════════════════════════════
let monthScrollInit = false;
let monthObserver   = null;

function renderMonth(){
  const scroll = document.getElementById('month-scroll');

  // Build once, then just refresh events
  if(!monthScrollInit){
    buildMonthScroll(scroll);
    monthScrollInit = true;
  } else {
    refreshMonthEvents(scroll);
  }

  // Scroll to cursor month
  scrollToMonth(state.cursor.getFullYear(), state.cursor.getMonth());
}

function buildMonthScroll(scroll){
  scroll.innerHTML='';
  const now = new Date();
  // Render 15 months before + 24 months after current
  const start = new Date(now.getFullYear(), now.getMonth()-15, 1);
  const end   = new Date(now.getFullYear(), now.getMonth()+25, 1);
  let cur = new Date(start);
  while(cur < end){
    scroll.appendChild(buildMonthSection(cur.getFullYear(), cur.getMonth()));
    cur.setMonth(cur.getMonth()+1);
  }

  // IntersectionObserver: update nav-title as months scroll into view
  if(monthObserver) monthObserver.disconnect();
  monthObserver = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting && e.intersectionRatio > 0.3){
        const{y,m}=e.target.dataset;
        document.getElementById('nav-title').textContent=`${MONTHS[m]} ${y}`;
        state.cursor = new Date(parseInt(y), parseInt(m), 1);
      }
    });
  },{root:scroll, threshold:0.3});

  scroll.querySelectorAll('.month-section').forEach(s=>monthObserver.observe(s));
}

function buildMonthSection(year, month){
  const todayK = todayKey();
  const now = new Date();
  const isCurrentMonth = year===now.getFullYear() && month===now.getMonth();

  const section = document.createElement('div');
  section.className='month-section';
  section.dataset.y=year; section.dataset.m=month;

  const title = document.createElement('div');
  title.className='month-section-title'+(isCurrentMonth?' current-month':'');
  title.textContent=`${MONTHS[month]} ${year}`;
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className='month-grid';
  grid.dataset.y=year; grid.dataset.m=month;

  const first = new Date(year,month,1);
  const offset = first.getDay();

  for(let i=0;i<42;i++){
    const d = new Date(first); d.setDate(1-offset+i);
    const key = tdk(d);
    const isOther = d.getMonth()!==month;
    const isToday = key===todayK;

    const cell = document.createElement('div');
    cell.className='day-cell'+(isOther?' other-month':'')+(isToday?' today':'');
    cell.dataset.date=key;

    const num = document.createElement('div');
    num.className='day-num'; num.textContent=d.getDate();
    cell.appendChild(num);
    cell.addEventListener('click',()=>openNewModal(key));

    fillCellEvents(cell, key);
    grid.appendChild(cell);
  }
  section.appendChild(grid);
  return section;
}

function fillCellEvents(cell, key){
  // Remove existing event elements (keep the day-num)
  Array.from(cell.children).forEach(c=>{ if(!c.classList.contains('day-num')) c.remove(); });

  const evs = eventsOn(key);
  const MAX=3; let shown=0;

  evs.forEach(ev=>{
    if(shown>=MAX) return; shown++;
    const col=cc(ev.category);
    const isMulti=ev.endDate&&ev.endDate>ev.date;

    if(isMulti){
      const isStart=ev.date===key, isEnd=ev.endDate===key;
      const bar=document.createElement('div');
      bar.className='event-span '+(isStart&&isEnd?'span-single':isStart?'span-start':isEnd?'span-end':'');
      bar.style.background=rgba(col,.3); bar.style.color=col;
      const show=isStart||pld(key).getDay()===0;
      // Abbreviate title to ~10 chars
      bar.textContent=show?abbr(ev.title,10):'';
      bar.title=ev.title;
      bar.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);});
      cell.appendChild(bar);
    } else {
      const pill=document.createElement('div');
      pill.className='event-pill';
      pill.style.background=rgba(col,.25); pill.style.color=col;
      // FIX #2: abbreviated text
      const timeStr=ev.allDay?'':(ev.start?ev.start.slice(0,5)+' ':'');
      pill.textContent=timeStr+abbr(ev.title,12);
      pill.title=ev.title;
      pill.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);});
      cell.appendChild(pill);
    }
  });
  if(evs.length>MAX){
    const m=document.createElement('div');
    m.className='more-badge'; m.textContent=`+${evs.length-MAX}`;
    cell.appendChild(m);
  }
}

// Abbreviate text to N chars
function abbr(text, n){
  return text.length<=n ? text : text.slice(0,n-1)+'…';
}

function refreshMonthEvents(scroll){
  scroll.querySelectorAll('.day-cell').forEach(cell=>{
    fillCellEvents(cell, cell.dataset.date);
  });
}

function scrollToMonth(year, month){
  const scroll=document.getElementById('month-scroll');
  const section=scroll.querySelector(`.month-section[data-y="${year}"][data-m="${month}"]`);
  if(section) section.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════
//  WEEK VIEW
// ═══════════════════════════════════════════
function weekStart(d){ const s=new Date(d); s.setDate(d.getDate()-d.getDay()); s.setHours(0,0,0,0); return s; }

function renderWeek(){
  const sun=weekStart(state.cursor), today=todayKey(), now=new Date();
  const hdr=document.getElementById('week-header');
  while(hdr.children.length>1) hdr.removeChild(hdr.lastChild);
  for(let i=0;i<7;i++){
    const d=new Date(sun); d.setDate(d.getDate()+i);
    const dh=document.createElement('div'); dh.className='wdh'+(tdk(d)===today?' today':'');
    dh.innerHTML=`<div class="wdn">${DAYS[d.getDay()]}</div><div class="wdd">${d.getDate()}</div>`;
    hdr.appendChild(dh);
  }
  const grid=document.getElementById('week-grid'); grid.innerHTML='';
  for(let h=0;h<24;h++){
    const l=document.createElement('div'); l.className='tlbl';
    l.textContent=h===0?'':`${String(h).padStart(2,'0')}:00`; grid.appendChild(l);
    for(let d=0;d<7;d++){
      const day=new Date(sun); day.setDate(day.getDate()+d);
      const key=tdk(day), s=document.createElement('div');
      s.className='wslot'; s.dataset.date=key; s.dataset.hour=h;
      s.addEventListener('click',()=>openNewModal(key,`${String(h).padStart(2,'0')}:00`));
      grid.appendChild(s);
    }
  }
  for(let d=0;d<7;d++){
    const day=new Date(sun); day.setDate(day.getDate()+d);
    eventsOn(tdk(day)).forEach(ev=>{
      const key=tdk(day);
      if(ev.allDay||!ev.start){
        const s=grid.querySelector(`.wslot[data-date="${key}"][data-hour="0"]`); if(!s)return;
        const el=document.createElement('div'); el.className='wev';
        el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
        el.style.top='2px'; el.style.height='40px'; el.textContent=abbr(ev.title,16);
        el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el);
        return;
      }
      const[sh,sm]=ev.start.split(':').map(Number);
      let em=sh*60+sm+60; if(ev.end){const[eh,em2]=ev.end.split(':').map(Number);em=eh*60+em2;}
      const s=grid.querySelector(`.wslot[data-date="${key}"][data-hour="${sh}"]`); if(!s)return;
      const el=document.createElement('div'); el.className='wev';
      el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
      el.style.top=(sm/44*44)+'px'; el.style.height=Math.max((em-sh*60-sm)/60*44-3,16)+'px';
      el.textContent=`${ev.start} ${abbr(ev.title,14)}`;
      el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el);
    });
  }
  const ti=[...Array(7)].map((_,i)=>{const d=new Date(sun);d.setDate(d.getDate()+i);return tdk(d);}).indexOf(today);
  if(ti>=0){
    const sl=grid.querySelectorAll(`.wslot[data-hour="${now.getHours()}"]`);
    if(sl[ti]){ const ln=document.createElement('div'); ln.className='now-line';
      ln.style.top=(now.getMinutes()/60*44)+'px'; ln.innerHTML='<div class="now-dot"></div>'; sl[ti].appendChild(ln); }
  }
  setTimeout(()=>{document.getElementById('week-body').scrollTop=8*44;},0);
}

// ═══════════════════════════════════════════
//  DAY VIEW
// ═══════════════════════════════════════════
function renderDay(){
  const c=state.cursor, key=tdk(c), today=todayKey(), now=new Date();
  const full=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('day-big').textContent=`${full[c.getDay()]}, ${MONTHS[c.getMonth()]} ${c.getDate()}`;
  document.getElementById('day-sub').textContent=key===today?'Today':`${c.getFullYear()}`;
  const grid=document.getElementById('day-grid'); grid.innerHTML='';
  for(let h=0;h<24;h++){
    const l=document.createElement('div'); l.className='tlbl';
    l.textContent=h===0?'':`${String(h).padStart(2,'0')}:00`; grid.appendChild(l);
    const s=document.createElement('div'); s.className='dslot'; s.dataset.hour=h;
    s.addEventListener('click',()=>openNewModal(key,`${String(h).padStart(2,'0')}:00`));
    grid.appendChild(s);
  }
  eventsOn(key).forEach(ev=>{
    if(ev.allDay||!ev.start){
      const s=grid.querySelector('.dslot[data-hour="0"]'); if(!s)return;
      const el=document.createElement('div'); el.className='dev';
      el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
      el.style.top='4px'; el.style.height='38px'; el.textContent=ev.title;
      el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el); return;
    }
    const[sh,sm]=ev.start.split(':').map(Number);
    let em=sh*60+sm+60; if(ev.end){const[eh,em2]=ev.end.split(':').map(Number);em=eh*60+em2;}
    const s=grid.querySelector(`.dslot[data-hour="${sh}"]`); if(!s)return;
    const el=document.createElement('div'); el.className='dev';
    el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
    el.style.top=(sm/60*44+2)+'px'; el.style.height=Math.max((em-sh*60-sm)/60*44-3,16)+'px';
    el.textContent=`${ev.start} ${ev.title}`;
    el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el);
  });
  if(key===today){
    const s=grid.querySelector(`.dslot[data-hour="${now.getHours()}"]`);
    if(s){ const ln=document.createElement('div'); ln.className='now-line';
      ln.style.top=(now.getMinutes()/60*44)+'px'; ln.innerHTML='<div class="now-dot"></div>'; s.appendChild(ln); }
  }
  setTimeout(()=>{document.getElementById('day-body').scrollTop=8*44;},0);
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function populateCat(sel){
  const el=document.getElementById('ev-cat'); el.innerHTML='';
  for(const[id,c] of Object.entries(state.categories)){
    const o=document.createElement('option'); o.value=id; o.textContent=c.name;
    if(id===sel) o.selected=true; el.appendChild(o);
  }
}
function openNewModal(dateKey,startTime){
  state.editingId=null;
  document.getElementById('modal-title').textContent='New Event';
  document.getElementById('ev-title').value='';
  document.getElementById('ev-date').value=dateKey;
  document.getElementById('ev-enddate').value='';
  document.getElementById('ev-allday').checked=!startTime;
  document.getElementById('ev-start').value=startTime||'09:00';
  document.getElementById('ev-end').value=startTime?`${String(parseInt(startTime)+1).padStart(2,'0')}:00`:'10:00';
  document.getElementById('time-fields').style.display=startTime?'':'none';
  document.getElementById('ev-del').classList.add('hidden');
  populateCat(Object.keys(state.categories)[0]);
  document.getElementById('event-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('ev-title').focus(),50);
}
function openEditModal(id){
  const ev=state.events.find(e=>e.id===id); if(!ev)return;
  state.editingId=id;
  document.getElementById('modal-title').textContent='Edit Event';
  document.getElementById('ev-title').value=ev.title;
  document.getElementById('ev-date').value=ev.date;
  document.getElementById('ev-enddate').value=ev.endDate||'';
  document.getElementById('ev-allday').checked=!!ev.allDay;
  document.getElementById('ev-start').value=ev.start||'09:00';
  document.getElementById('ev-end').value=ev.end||'10:00';
  document.getElementById('time-fields').style.display=ev.allDay?'none':'';
  document.getElementById('ev-del').classList.remove('hidden');
  populateCat(ev.category);
  document.getElementById('event-overlay').classList.remove('hidden');
}
function closeModal(){ document.getElementById('event-overlay').classList.add('hidden'); state.editingId=null; }

document.getElementById('ev-allday').addEventListener('change',e=>{
  document.getElementById('time-fields').style.display=e.target.checked?'none':'';
});
document.getElementById('ev-save').addEventListener('click',()=>{
  const title=document.getElementById('ev-title').value.trim(); if(!title){document.getElementById('ev-title').focus();return;}
  const sd=document.getElementById('ev-date').value, ed=document.getElementById('ev-enddate').value||null;
  const ev={
    id:state.editingId||uid(), title,
    date:sd, endDate:(ed&&ed>sd)?ed:null,
    category:document.getElementById('ev-cat').value,
    allDay:document.getElementById('ev-allday').checked||!!(ed&&ed>sd),
    start:document.getElementById('ev-allday').checked?null:document.getElementById('ev-start').value,
    end:  document.getElementById('ev-allday').checked?null:document.getElementById('ev-end').value,
  };
  state.events=state.editingId?state.events.map(e=>e.id===state.editingId?ev:e):[...state.events,ev];
  save(); closeModal();
  if(state.view==='month') refreshMonthEvents(document.getElementById('month-scroll'));
  else render();
});
document.getElementById('ev-del').addEventListener('click',()=>{
  if(!state.editingId)return;
  state.events=state.events.filter(e=>e.id!==state.editingId);
  save(); closeModal();
  if(state.view==='month') refreshMonthEvents(document.getElementById('month-scroll'));
  else render();
});
document.getElementById('ev-cancel').addEventListener('click',closeModal);
document.getElementById('ev-close').addEventListener('click',closeModal);
document.getElementById('event-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('event-overlay'))closeModal();});

// ═══════════════════════════════════════════
function renderSettings(){
  const list=document.getElementById('cat-list'); list.innerHTML='';
  for(const[id,cat] of Object.entries(state.categories)){
    const row=document.createElement('div'); row.className='cat-row';
    const sw=document.createElement('div'); sw.className='cat-swatch'; sw.style.background=cat.color;
    const ci=document.createElement('input'); ci.type='color'; ci.value=cat.color;
    ci.addEventListener('input',e=>{state.categories[id].color=e.target.value;sw.style.background=e.target.value;save();applyColors();if(state.view==='month')refreshMonthEvents(document.getElementById('month-scroll'));else render();});
    sw.appendChild(ci);
    const ni=document.createElement('input'); ni.type='text'; ni.className='cat-ni'; ni.value=cat.name;
    ni.addEventListener('change',e=>{state.categories[id].name=e.target.value;save();render();});
    row.appendChild(sw); row.appendChild(ni); list.appendChild(row);
  }
}
document.getElementById('settings-btn').addEventListener('click',()=>{renderSettings();document.getElementById('settings-panel').classList.add('open');});
document.getElementById('settings-close').addEventListener('click',()=>document.getElementById('settings-panel').classList.remove('open'));

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
document.getElementById('prev-btn').addEventListener('click',()=>{
  if(state.view==='month'){state.cursor.setMonth(state.cursor.getMonth()-1); scrollToMonth(state.cursor.getFullYear(),state.cursor.getMonth());}
  else if(state.view==='week') state.cursor.setDate(state.cursor.getDate()-7);
  else state.cursor.setDate(state.cursor.getDate()-1);
  if(state.view!=='month') render(); else updateNavTitle();
});
document.getElementById('next-btn').addEventListener('click',()=>{
  if(state.view==='month'){state.cursor.setMonth(state.cursor.getMonth()+1); scrollToMonth(state.cursor.getFullYear(),state.cursor.getMonth());}
  else if(state.view==='week') state.cursor.setDate(state.cursor.getDate()+7);
  else state.cursor.setDate(state.cursor.getDate()+1);
  if(state.view!=='month') render(); else updateNavTitle();
});
document.getElementById('today-btn').addEventListener('click',()=>{
  state.cursor=new Date();
  if(state.view==='month') scrollToMonth(state.cursor.getFullYear(),state.cursor.getMonth());
  else render();
});
document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{state.view=b.dataset.view;render();}));

// ═══════════════════════════════════════════
//  NLP PARSER — multilingual (EN/DE/FR/LU/NL)
// ═══════════════════════════════════════════

// Words to strip from title (multi-language)
const NOISE_STRIP = [
  // English
  /\b(i will|i'm|im going to|i am|i'll|going to|will be|want to|i go|i travel|i fly)\b/gi,
  /\b(today|tomorrow|yesterday|tonight|this morning|this evening)\b/gi,
  // German
  /\b(ich werde|ich gehe|ich fliege|ich fahre|ich bin|werde|gehe|fahre|fliege|bin|komme)\b/gi,
  /\b(heute|morgen|gestern|übermorgen|uebermorgen|nächste|naechste|nächsten|naechsten)\b/gi,
  /\b(nach|zum|zur|am|im|um|von|bis|ab|an)\b/gi,
  // French
  /\b(je vais|je vais à|je pars|je voyage|je vole|je serai|je suis|vais|pars|voyage)\b/gi,
  /\b(aujourd'hui|demain|hier|après-demain|apres-demain|ce soir|ce matin)\b/gi,
  /\b(à|au|aux|du|de|en|pour|jusqu'au|jusqu'à|le|la|les|un|une)\b/gi,
  // Luxembourgish
  /\b(ech fueren|ech fléien|ech ginn|ech si|fueren|fléien|ginn)\b/gi,
  /\b(haut|muer|gëschter|geschter|nächste|naichte)\b/gi,
];

// Relative date words → offset in days (multi-language)
const RELATIVE_MAP = {
  // English
  today:0, tomorrow:1, yesterday:-1, tonight:0,
  // German
  heute:0, morgen:1, gestern:-1, übermorgen:2, uebermorgen:2,
  // French
  "aujourd'hui":0, "aujourd hui":0, demain:1, hier:-1, "après-demain":2, "apres-demain":2,
  // Luxembourgish
  haut:0, muer:1, 'gëschter':-1, geschter:-1,
};

// "next week" equivalents
const NEXT_WEEK = /\b(next week|nächste woche|naechste woche|la semaine prochaine|d'nächst woch|volgende week)\b/i;

// "in X days/weeks/months" multi-language
const IN_DAYS   = /\bin (\d+)\s*(?:days?|tagen?|jours?|deeg)\b/i;
const IN_WEEKS  = /\bin (\d+)\s*(?:weeks?|wochen?|semaines?|wochen)\b/i;
const IN_MONTHS = /\bin (\d+)\s*(?:months?|monaten?|mois|méint|meint)\b/i;

function resolveMonthDate(mIdx, day, refYear){
  const d=new Date(refYear,mIdx,day||1);
  const now=new Date(); now.setHours(0,0,0,0);
  if(d<now) d.setFullYear(refYear+1);
  return d;
}

function parseFuzzyDate(phrase, today){
  const p=phrase.toLowerCase().trim().replace(/[éè]/g,'e').replace(/[ü]/g,'u').replace(/[ä]/g,'a').replace(/[ö]/g,'o');
  const yr=today.getFullYear();
  const mName=Object.keys(MONTH_MAP).join('|');
  const mdM=p.match(new RegExp('('+mName+')\\s+(\\d{1,2})(?:st|nd|rd|th|\\.)?'));
  const dmM=p.match(new RegExp('(\\d{1,2})(?:st|nd|rd|th|\\.)?\\s+('+mName+')'));
  if(mdM&&MONTH_MAP[mdM[1]]!==undefined) return resolveMonthDate(MONTH_MAP[mdM[1]],parseInt(mdM[2]),yr);
  if(dmM&&MONTH_MAP[dmM[2]]!==undefined) return resolveMonthDate(MONTH_MAP[dmM[2]],parseInt(dmM[1]),yr);
  // Just a month name
  for(const[name,idx] of Object.entries(MONTH_MAP)){ if(p===name) return resolveMonthDate(idx,1,yr); }
  // Ordinal: "the 15th", "15."
  const ord=p.match(/(?:the\s+)?(\d{1,2})(?:st|nd|rd|th|\.)/);
  if(ord){const d=new Date(today);d.setDate(parseInt(ord[1]));return d;}
  return null;
}

// Common event type translations to English
const EVENT_TYPE_MAP = {
  // German → English
  'arzt':'Doctor appointment','zahnarzt':'Dentist appointment','prüfung':'Exam',
  'vorlesung':'Lecture','seminar':'Seminar','fitnessstudio':'Gym','sport':'Sport',
  'urlaub':'Vacation','geburtstag':'Birthday','besprechung':'Meeting',
  'training':'Training','reise':'Trip','flug':'Flight','hausarbeit':'Assignment',
  'konzert':'Concert','party':'Party',
  // French → English
  'médecin':'Doctor appointment','medecin':'Doctor appointment',
  'dentiste':'Dentist appointment','examen':'Exam','cours':'Lecture',
  'vacances':'Vacation','anniversaire':'Birthday','réunion':'Meeting',
  'reunion':'Meeting','voyage':'Trip','vol':'Flight','concert':'Concert',
  'fête':'Party','fete':'Party','sport':'Sport','salle de sport':'Gym',
  // Luxembourgish
  'dokter':'Doctor appointment','douteur':'Doctor appointment',
  'prüfung':'Exam','vakanz':'Vacation','gebuertsdag':'Birthday',
  'reunioun':'Meeting','reese':'Trip','fluch':'Flight',
};

// Noise words that should NOT become the event title
const DATE_NOISE_RE = /^(from|on|at|in|next|this|the|a|an|my|for|until|till|through|and|or|with|to|von|nach|bis|am|um|zu|zur|zum|de|du|à|au|aux|le|la|les|un|une|en|pour|op|vun|bis|an|ech|ich|je|i)$/i;

function extractDestination(text){
  // Multi-language "go to X" patterns
  const goPatterns = /\b(?:go(?:ing)?\s+to|travel(?:l?ing)?\s+to|fly(?:ing)?\s+to|trip\s+to|visit(?:ing)?\s+to?|heading\s+to|drive\s+to|flight\s+to|train\s+to|fahren\s+nach|fliegen\s+nach|reise?\s+nach|reisen?\s+nach|fahre\s+nach|vais\s+[aà]|voyage\s+[aà]|pars\s+pour|vole\s+vers|fueren\s+op|fléien\s+op|ginn\s+op)\s+([A-Za-zÀ-ÿ]+(?:\s+[A-Za-zÀ-ÿ]+)?)/i;
  const m=text.match(goPatterns);
  if(m){
    const dest=m[1].split(/\s+/).filter((w,i)=>(i===0||/^[A-Z]/i.test(w))&&!DATE_NOISE_RE.test(w)).join(' ');
    if(dest&&dest.length>1) return dest;
  }
  // "from X to City"
  const fm=text.match(/\bto\s+([A-ZÀ-Ý][a-zA-ZÀ-ÿ]+)(?:\s|$)/);
  if(fm&&!DATE_NOISE_RE.test(fm[1])) return fm[1];
  return null;
}

function guessCategory(text){
  const t=text.toLowerCase();
  // Travel intent verbs
  if(/\b(go|going|travel|fly|flying|trip|visit|fahren|fliegen|reisen|vais|voyage|partir|fueren|fléien|ginn)\s+(to|nach|[aà]|op)\b/.test(t)) return 'travel';
  const rules={
    uni:['lecture','class','assignment','exam','study','uni','university','college','deadline',
         'homework','essay','seminar','dissertation','thesis','coursework','module',
         // German
         'vorlesung','prüfung','pruefung','hausarbeit','seminar','universität','hochschule','studium','klausur',
         // French
         'cours','examen','devoir','conférence','universite','université',
         // LU
         'schoul','lycée','lycee'],
    health:['gym','workout','run','yoga','doctor','dentist','appointment','exercise','swim',
            'training','fitness','physio','hospital','medication','jog','cycling','sport','match',
            // German
            'arzt','zahnarzt','fitnessstudio','laufen','joggen','krankenhaus','medikament',
            // French
            'médecin','medecin','dentiste','hôpital','hopital','entrainement','courir',
            // LU
            'dokter','douteur'],
    travel:['flight','train','trip','travel','hotel','airport','journey','ferry','holiday',
            'vacation','abroad','depart','arrive','airbnb','hostel','visa','boarding','tour',
            // German
            'flug','zug','reise','urlaub','hotel','flughafen','bahnhof','fahrt','ausflug',
            // French
            'vol','voyage','vacances','hôtel','aéroport','aeroport','départ','depart',
            // LU
            'vakanz','fluch','rees'],
  };
  for(const[cat,kws] of Object.entries(rules)){ if(kws.some(k=>t.includes(k))) return cat; }
  return 'personal';
}

function parseNLP(rawText){
  // Normalise accents for matching, keep original for display
  const t=rawText.toLowerCase()
    .replace(/é/g,'e').replace(/è/g,'e').replace(/ê/g,'e').replace(/ë/g,'e')
    .replace(/à/g,'a').replace(/â/g,'a').replace(/ä/g,'a').replace(/æ/g,'ae')
    .replace(/ü/g,'u').replace(/û/g,'u').replace(/ù/g,'u')
    .replace(/ö/g,'o').replace(/ô/g,'o')
    .replace(/î/g,'i').replace(/ï/g,'i')
    .replace(/ß/g,'ss').replace(/ç/g,'c')
    .replace(/[ëéèê]/g,'e')
    .trim();

  const today=new Date(); today.setHours(0,0,0,0);
  let startDate=new Date(today), endDate=null;
  let tStart=null, tEnd=null, allDay=true;
  let title=rawText.trim();

  // ── 1. DATE RANGE ──────────────────────────────────────────────
  // EN: from X to Y | DE: von X bis Y | FR: du X au Y / de X à Y | LU: vun X bis Y
  const rangeRe=/\b(?:from|von|vun|du|de)\s+(.+?)\s+(?:to|bis|au|jusqu'au|jusqua|en|jusqu'a)\s+(.+?)(?:\s+(?:at|um|à|a|op|in)\b|$)/i;
  const rm=t.match(rangeRe);
  if(rm){
    const d1=parseFuzzyDate(rm[1],today), d2=parseFuzzyDate(rm[2],today);
    if(d1) startDate=d1;
    if(d2&&d1){ if(d2<d1) d2.setFullYear(d2.getFullYear()+1); endDate=d2; allDay=true; }
  } else {
    // ── 2. SINGLE DATE ─────────────────────────────────────────────
    let found=false;

    // Relative words
    for(const[word,offset] of Object.entries(RELATIVE_MAP)){
      if(new RegExp('\\b'+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(t)){
        startDate.setDate(startDate.getDate()+offset); found=true; break;
      }
    }

    // "in X days/weeks/months"
    if(!found){
      const id=t.match(IN_DAYS), iw=t.match(IN_WEEKS), im=t.match(IN_MONTHS);
      if(id){startDate.setDate(startDate.getDate()+parseInt(id[1]));found=true;}
      else if(iw){startDate.setDate(startDate.getDate()+parseInt(iw[1])*7);found=true;}
      else if(im){startDate.setMonth(startDate.getMonth()+parseInt(im[1]));found=true;}
    }
    if(!found&&NEXT_WEEK.test(t)){startDate.setDate(startDate.getDate()+7);found=true;}

    // Day name: "next/this/nächsten/prochain + dayname" OR bare day name
    if(!found){
      const allDayNames=Object.keys(DAY_MAP).join('|');
      const dm=t.match(new RegExp('\\b(?:next|this|nachsten|naechsten|nächsten|prochain|prochaine|d\')\s+('+allDayNames+')\\b'))
             ||t.match(new RegExp('\\b('+allDayNames+')\\b'));
      if(dm){
        const dn=dm[dm.length-1];
        if(DAY_MAP[dn]!==undefined){
          let diff=DAY_MAP[dn]-startDate.getDay(); if(diff<=0)diff+=7;
          startDate.setDate(startDate.getDate()+diff); found=true;
        }
      }
    }

    // Month-name date
    if(!found){
      const fd=parseFuzzyDate(t.replace(/\b(?:at|um|à|a|op)\s+\d.*$/,'').trim(),today);
      if(fd){startDate=fd;found=true;}
    }
  }

  // ── 3. TIME (single-day only) ──────────────────────────────────
  if(!endDate){
    // "at/um/à 14:00" or "at/um/à 3pm"
    const tm=t.match(/\b(?:at|um|[aà])\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm|uhr)?/i);
    if(tm){
      let h=parseInt(tm[1]); const m2=parseInt(tm[2]||'0'), ap=(tm[3]||'').toLowerCase();
      if(ap==='pm'&&h<12)h+=12; if(ap==='am'&&h===12)h=0;
      if(!ap&&h<8)h+=12; // assume pm for small ambiguous numbers
      tStart=`${String(h).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
      tEnd=`${String((h+1)%24).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
      allDay=false;
    }
    // Fuzzy time words (multi-language)
    if(allDay){
      const fz={
        morning:['08:00','09:00'],morgen:['08:00','09:00'],matin:['08:00','09:00'],moien:['08:00','09:00'],
        afternoon:['13:00','14:00'],nachmittag:['13:00','14:00'],'après-midi':['13:00','14:00'],nomëtteg:['13:00','14:00'],
        evening:['18:00','19:00'],abend:['18:00','19:00'],soir:['18:00','19:00'],owend:['18:00','19:00'],
        night:['20:00','21:00'],nacht:['20:00','21:00'],nuit:['20:00','21:00'],nuecht:['20:00','21:00'],
        noon:['12:00','13:00'],mittag:['12:00','13:00'],midi:['12:00','13:00'],mëtteg:['12:00','13:00'],
      };
      for(const[w,[s,e]] of Object.entries(fz)){
        if(t.includes(w)){tStart=s;tEnd=e;allDay=false;break;}
      }
    }
  }

  // ── 4. TITLE ──────────────────────────────────────────────────
  const dest=extractDestination(rawText);
  if(dest){
    title=dest;
  } else {
    // Check for known event type keywords → translate to English
    const tLow=rawText.toLowerCase();
    let mapped=null;
    for(const[kw,en] of Object.entries(EVENT_TYPE_MAP)){
      if(tLow.includes(kw)){mapped=en;break;}
    }
    if(mapped){
      title=mapped;
    } else {
      // Strip noise patterns
      for(const r of NOISE_STRIP) title=title.replace(r,' ');
      // Strip date/time noise
      const mName=Object.keys(MONTH_MAP).join('|');
      const strips=[
        /\bfrom\s+\S.*?\b(?:to|until|till|through|bis|au|jusqu'au)\s+\S+/gi,
        /\bvon\s+\S.*?\bbis\s+\S+/gi,
        /\bin \d+ (?:days?|tagen?|jours?|weeks?|wochen?|semaines?|months?|monaten?|mois)\b/gi,
        new RegExp('\\b('+mName+')\\s+\\d{1,2}(?:st|nd|rd|th|\\.)?\\b','gi'),
        new RegExp('\\b\\d{1,2}(?:st|nd|rd|th|\\.)?\\s+('+mName+')\\b','gi'),
        /\b(?:at|um|[aà])\s+\d{1,2}(?::\d{2})?\s*(?:am|pm|uhr)?\b/gi,
        /\b(?:morning|afternoon|evening|night|noon|morgen|abend|mittag|nachmittag|nacht|matin|midi|soir|nuit|moien|mëtteg|owend|nuecht|nomëtteg)\b/gi,
        /\b(?:next|this|nächste|naechste|prochain|prochaine)\s+(?:week|woche|semaine|woch)\b/gi,
        new RegExp('\\b('+Object.keys(DAY_MAP).join('|')+')\\b','gi'),
        new RegExp('\\b('+Object.keys(RELATIVE_MAP).map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','gi'),
      ];
      for(const r of strips) title=title.replace(r,' ');
      title=title.replace(/\s+/g,' ').trim()||rawText.trim();
    }
  }
  title=title.charAt(0).toUpperCase()+title.slice(1);

  return{title, date:tdk(startDate), endDate:endDate?tdk(endDate):null,
         category:guessCategory(rawText), allDay:allDay||!!endDate, start:tStart, end:tEnd};
}

// ═══════════════════════════════════════════
//  VOICE — FIX #1: stops 1.5s after speech ends
// ═══════════════════════════════════════════
const micBtn=document.getElementById('mic-btn');
const bubble=document.getElementById('transcript-bubble');
let recognition=null, isListening=false;
let silTimer=null, latestFinal='', latestInterim='';
const SILENCE_MS=1500; // stop 1.5s after speech ends

function showB(t){bubble.textContent=t;bubble.classList.add('visible')}
function hideB(){bubble.classList.remove('visible')}
function armSilence(){
  clearTimeout(silTimer);
  silTimer=setTimeout(()=>{if(isListening)recognition.stop();},SILENCE_MS);
}
function disarmSilence(){clearTimeout(silTimer);silTimer=null;}

if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='en-US';  // browser captures audio; we handle multilingual in NLP

  recognition.onstart=()=>showB('Listening…');
  recognition.onspeechstart=()=>{disarmSilence();showB(latestFinal||latestInterim||'Listening…');};
  recognition.onresult=e=>{
    latestFinal='';latestInterim='';
    for(const r of e.results){if(r.isFinal)latestFinal+=r[0].transcript;else latestInterim+=r[0].transcript;}
    showB(latestFinal||latestInterim||'…');
    disarmSilence(); // reset while speaking
  };
  // FIX #1: arm timer as soon as speech stops
  recognition.onspeechend=()=>armSilence();
  recognition.onerror=e=>{
    disarmSilence();stopListening();
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){showB('Microphone access denied');setTimeout(hideB,3000);}
    else if(e.error!=='no-speech'&&e.error!=='aborted'){showB('Try again');setTimeout(hideB,1800);}
  };
  recognition.onend=()=>{
    disarmSilence();
    const text=latestFinal||latestInterim;
    stopListening();hideB();
    if(text){latestFinal=latestInterim='';prefill(text);}
  };
  micBtn.addEventListener('click',()=>{
    if(isListening){disarmSilence();recognition.stop();}
    else startListening();
  });
} else {
  micBtn.title='Type event';
  micBtn.addEventListener('click',()=>{
    const t=prompt('Describe your event (EN/DE/FR/LU):\ne.g. "Ich fahre nach Utrecht von 30. Mai bis 1. Juni"');
    if(t) prefill(t);
  });
}

function startListening(){
  isListening=true;latestFinal='';latestInterim='';
  micBtn.classList.add('listening');showB('Listening…');
  try{recognition.start();}catch(_){}
}
function stopListening(){
  isListening=false;disarmSilence();micBtn.classList.remove('listening');
}
function prefill(text){
  const p=parseNLP(text); state.editingId=null;
  document.getElementById('modal-title').textContent='New Event';
  document.getElementById('ev-title').value=p.title;
  document.getElementById('ev-date').value=p.date;
  document.getElementById('ev-enddate').value=p.endDate||'';
  document.getElementById('ev-allday').checked=p.allDay;
  document.getElementById('ev-start').value=p.start||'09:00';
  document.getElementById('ev-end').value=p.end||'10:00';
  document.getElementById('time-fields').style.display=p.allDay?'none':'';
  document.getElementById('ev-del').classList.add('hidden');
  populateCat(p.category);
  document.getElementById('event-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('ev-title').focus(),50);
}
