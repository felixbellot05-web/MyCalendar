<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calendar</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendar">
<meta name="theme-color" content="#0d0d0d">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d0d0d'/><rect x='15' y='25' width='70' height='60' rx='8' fill='none' stroke='%23a855f7' stroke-width='4'/><line x1='15' y1='42' x2='85' y2='42' stroke='%23a855f7' stroke-width='3'/><rect x='30' y='18' width='8' height='16' rx='4' fill='%23a855f7'/><rect x='62' y='18' width='8' height='16' rx='4' fill='%23a855f7'/><rect x='25' y='52' width='12' height='10' rx='3' fill='%2322c55e'/><rect x='44' y='52' width='12' height='10' rx='3' fill='%23f97316'/><rect x='63' y='52' width='12' height='10' rx='3' fill='%2314b8a6'/><rect x='25' y='68' width='12' height='10' rx='3' fill='%23a855f7'/></svg>">
<link id="pwa-manifest" rel="manifest">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d0d;--sf:#161616;--sf2:#1f1f1f;--sf3:#2a2a2a;
  --bd:#2e2e2e;--tx:#f0f0f0;--tx2:#888;--tx3:#555;
  --r:9px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --bar-h:calc(68px + var(--safe-bot));
  --cell-h:68px;
}

html{height:100%;background:#0d0d0d}

body{
  background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  /* Use dvh so iOS address bar changes don't break layout */
  height:100dvh;height:100vh; /* fallback first */
  display:flex;flex-direction:column;overflow:hidden;
  user-select:none;-webkit-user-select:none;
  padding-left:var(--safe-l);padding-right:var(--safe-r);
  /* Reserve space at bottom for the fixed bottom bar */
  padding-bottom:var(--bar-h);
}

/* ───────────────────────────────────────────
   TOP BAR — two rows, always fits iPhone
─────────────────────────────────────────── */
#topbar{
  background:var(--sf);
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
  /* Dynamic Island clearance: safe-top + 10px breathing room */
  padding-top:max(14px, calc(var(--safe-top) + 10px));
}

/* Row 1: ‹ [Month Year] › ⚙ */
#topbar-row1{
  display:flex;align-items:center;
  padding:0 14px 8px;
  gap:8px;
}

/* Row 2: [Month|Week|Day] … [Today] */
#topbar-row2{
  display:flex;align-items:center;
  padding:0 14px 12px;
  gap:8px;
}

/* Nav arrow buttons */
.nav-btn{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  cursor:pointer;border-radius:9px;
  min-width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;line-height:1;
  transition:background .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:active{background:var(--sf3)}

/* Month/Year title stretches to fill row */
#nav-title{
  flex:1;text-align:center;
  font-size:1rem;font-weight:700;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Settings gear — same size as nav buttons */
#settings-btn{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);
  cursor:pointer;border-radius:9px;
  min-width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  transition:color .1s,background .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
#settings-btn:active{color:var(--tx);background:var(--sf3)}

/* View switcher fills available width */
#view-switcher{
  flex:1;
  display:flex;background:var(--sf2);border:1px solid var(--bd);
  border-radius:9px;overflow:hidden;
}
.view-btn{
  flex:1;background:none;border:none;color:var(--tx2);
  cursor:pointer;height:36px;
  font-size:.74rem;font-weight:700;
  transition:background .1s,color .1s;
  -webkit-tap-highlight-color:transparent;
}
.view-btn.active{background:var(--sf3);color:var(--tx)}
.view-btn:active:not(.active){background:var(--sf2)}

/* Today button */
#today-btn{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  cursor:pointer;border-radius:9px;
  height:36px;padding:0 14px;
  font-size:.72rem;font-weight:700;font-family:inherit;
  white-space:nowrap;flex-shrink:0;
  transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
#today-btn:active{background:var(--sf3)}

/* ───────────────────────────────────────────
   CALENDAR CONTAINER
─────────────────────────────────────────── */
#calendar-container{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  min-height:0; /* critical for nested flex scroll */
}

/* ───────────────────────────────────────────
   MONTH VIEW
─────────────────────────────────────────── */
#month-view{display:flex;flex-direction:column;height:100%;min-height:0}

#dow-header{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:7px 8px 5px;flex-shrink:0;
}
.dow-cell{
  text-align:center;font-size:.6rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);
}

#month-scroll{
  flex:1;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 8px 12px;
  scrollbar-width:thin;scrollbar-color:var(--sf3) transparent;
}

.month-section{margin-bottom:10px}
.month-section-title{
  font-size:.75rem;font-weight:700;color:var(--tx2);
  padding:7px 2px 5px;letter-spacing:.02em;
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.month-section-title.current-month{color:var(--tx)}

.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}

.day-cell{
  height:var(--cell-h);
  background:var(--sf);border:1px solid var(--bd);border-radius:8px;
  padding:4px 3px 2px;
  display:flex;flex-direction:column;
  overflow:hidden;cursor:pointer;position:relative;z-index:1;
  transition:border-color .1s;
  -webkit-tap-highlight-color:transparent;
}
.day-cell:active{border-color:#444;background:var(--sf2)}
.day-cell.other-month{opacity:.28}
.day-cell.today{border-color:#3a3a3a}
.day-cell.today .day-num{
  background:var(--tx);color:var(--bg);border-radius:50%;
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.day-num{
  font-size:.65rem;font-weight:500;color:var(--tx2);
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* Single-day pill */
.event-pill{
  border-radius:3px;padding:1px 4px;
  font-size:.55rem;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;opacity:.9;flex-shrink:0;margin-top:1px;
}

/* Multi-day spanning bar */
.event-span{
  height:13px;font-size:.52rem;font-weight:700;
  white-space:nowrap;overflow:hidden;
  cursor:pointer;opacity:.95;flex-shrink:0;
  display:flex;align-items:center;padding:0 4px;
  margin-top:1px;
  border-radius:0;margin-left:-9px;margin-right:-9px;
}
.event-span.span-start{border-radius:6px 0 0 6px;margin-left:2px;margin-right:-9px}
.event-span.span-end  {border-radius:0 6px 6px 0;margin-left:-9px;margin-right:2px}
.event-span.span-single{border-radius:6px;margin-left:2px;margin-right:2px}

.more-badge{font-size:.5rem;color:var(--tx3);padding:0 2px;margin-top:1px;flex-shrink:0}

/* ───────────────────────────────────────────
   WEEK VIEW
─────────────────────────────────────────── */
#week-view{display:flex;flex-direction:column;height:100%;min-height:0;padding:0 8px}
#week-header{
  display:grid;grid-template-columns:40px repeat(7,1fr);
  padding:7px 0 6px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.wdh{text-align:center}
.wdh .wdn{font-size:.57rem;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);font-weight:700}
.wdh .wdd{font-size:.88rem;font-weight:600;color:var(--tx);margin-top:2px}
.wdh.today .wdd{
  background:var(--tx);color:var(--bg);border-radius:50%;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;margin:2px auto 0;
}
#week-body{
  flex:1;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--sf3) transparent;
}
#week-grid{display:grid;grid-template-columns:40px repeat(7,1fr);position:relative}
.tlbl{
  font-size:.54rem;color:var(--tx3);text-align:right;
  padding-right:6px;height:44px;
  display:flex;align-items:flex-start;justify-content:flex-end;margin-top:-6px;
}
.wslot{
  height:44px;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);
  position:relative;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.wslot:active{background:var(--sf2)}
.wev{
  position:absolute;left:1px;right:1px;border-radius:4px;
  padding:2px 4px;font-size:.6rem;font-weight:600;
  overflow:hidden;cursor:pointer;z-index:2;line-height:1.2;
}

/* ───────────────────────────────────────────
   DAY VIEW
─────────────────────────────────────────── */
#day-view{display:flex;flex-direction:column;height:100%;min-height:0;padding:0 8px}
#day-hdr{padding:8px 0 8px 40px;border-bottom:1px solid var(--bd);flex-shrink:0}
#day-hdr .dbig{font-size:1.1rem;font-weight:700}
#day-hdr .dsub{font-size:.72rem;color:var(--tx2);margin-top:2px}
#day-body{
  flex:1;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--sf3) transparent;
}
#day-grid{display:grid;grid-template-columns:40px 1fr;position:relative}
.dslot{
  height:44px;border-bottom:1px solid var(--bd);
  position:relative;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.dslot:active{background:var(--sf2)}
.dev{
  position:absolute;left:3px;right:3px;border-radius:5px;
  padding:2px 6px;font-size:.68rem;font-weight:600;overflow:hidden;cursor:pointer;z-index:2;
}

/* ───────────────────────────────────────────
   BOTTOM BAR + MIC
─────────────────────────────────────────── */
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bar-h);
  background:var(--sf);border-top:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  padding-bottom:var(--safe-bot);
  padding-left:var(--safe-l);
  padding-right:var(--safe-r);
  z-index:1000;
}
#mic-area{
  display:flex;flex-direction:column-reverse;align-items:center;gap:8px;
  pointer-events:none;
}
#transcript-bubble{
  background:var(--sf2);border:1px solid var(--bd);border-radius:20px;
  padding:6px 16px;font-size:.74rem;color:var(--tx2);
  max-width:260px;text-align:center;
  display:none;animation:fadeUp .18s;pointer-events:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#transcript-bubble.visible{display:block}
#mic-btn{
  width:52px;height:52px;border-radius:50%;
  background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx2);
  cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,border-color .15s,background .15s;
  box-shadow:0 2px 14px rgba(0,0,0,.6);
  pointer-events:auto;
  -webkit-tap-highlight-color:transparent;
}
#mic-btn:active{transform:scale(.91)}
#mic-btn svg{transition:color .2s}
#mic-btn.listening{
  background:rgba(229,57,53,.13);
  border-color:#e53935;
}
#mic-btn.listening svg{color:#e53935}
#mic-btn.listening::after{
  content:'';position:absolute;
  width:68px;height:68px;border-radius:50%;
  border:2px solid rgba(229,57,53,.3);
  animation:ripple 1.6s ease-out infinite;
  pointer-events:none;
}
@keyframes ripple{
  0%{transform:scale(1);opacity:.8}
  100%{transform:scale(1.55);opacity:0}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1;transform:translateY(0)}
}

/* ───────────────────────────────────────────
   EVENT MODAL — bottom sheet style
─────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  z-index:2000;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .15s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay.hidden{display:none!important}

.modal{
  background:var(--sf);
  border:1px solid var(--bd);
  border-radius:20px 20px 0 0;
  width:100%;max-width:520px;
  padding:22px 18px;
  padding-bottom:max(22px, calc(var(--safe-bot) + 14px));
  animation:sheetUp .22s cubic-bezier(.4,0,.2,1);
  max-height:88vh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  position:relative;
}
@keyframes sheetUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
/* drag handle */
.modal::before{
  content:'';display:block;
  width:36px;height:4px;background:var(--sf3);
  border-radius:2px;margin:0 auto 18px;
}
.modal h2{font-size:.92rem;font-weight:700;margin-bottom:16px;padding-right:28px}
.fg{margin-bottom:12px}
.fg label{
  display:block;font-size:.62rem;color:var(--tx2);font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;
}
.fg input,.fg select{
  width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  border-radius:9px;padding:10px 12px;font-size:.87rem;outline:none;
  transition:border-color .15s;font-family:inherit;
  -webkit-appearance:none;
}
.fg input:focus,.fg select:focus{border-color:#555}
.fg select option{background:var(--sf2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.allday-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.allday-row label{font-size:.85rem;color:var(--tx2);cursor:pointer}
.allday-row input[type=checkbox]{
  width:19px;height:19px;accent-color:var(--tx);cursor:pointer;flex-shrink:0;
}
.modal-actions{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:20px;gap:8px;
}
.btn{
  border:none;border-radius:10px;padding:12px 20px;
  font-size:.82rem;font-weight:700;cursor:pointer;
  transition:opacity .1s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{opacity:.7}
.btn-primary{background:var(--tx);color:var(--bg)}
.btn-ghost{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}
.btn-danger{background:rgba(229,57,53,.1);color:#e57373;border:1px solid rgba(229,57,53,.2)}
.close-btn{
  position:absolute;top:18px;right:16px;
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx3);
  cursor:pointer;border-radius:50%;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.close-btn:active{color:var(--tx)}

/* ───────────────────────────────────────────
   SETTINGS PANEL — slides from right
   z-index ABOVE bottom bar (1000) and modal (2000)
─────────────────────────────────────────── */
#settings-panel{
  position:fixed;top:0;right:0;
  height:100%;
  width:min(300px, 100%);
  background:var(--sf);border-left:1px solid var(--bd);
  z-index:3000; /* above modal and bottom bar */
  transform:translateX(110%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  padding-top:max(24px, calc(var(--safe-top) + 16px));
  padding-left:22px;padding-right:22px;
  padding-bottom:max(22px, calc(var(--safe-bot) + 16px));
}
#settings-panel.open{transform:translateX(0)}
#settings-panel h3{font-size:.95rem;font-weight:700;margin-bottom:4px}
#settings-panel .ssub{font-size:.7rem;color:var(--tx3);margin-bottom:20px}
.stitle{
  font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--tx3);font-weight:700;margin-bottom:10px;
}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cat-swatch{
  width:30px;height:30px;border-radius:8px;cursor:pointer;
  position:relative;overflow:hidden;flex-shrink:0;transition:transform .15s;
}
.cat-swatch:active{transform:scale(.88)}
.cat-swatch input[type=color]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.cat-ni{
  flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  border-radius:8px;padding:8px 10px;font-size:.82rem;outline:none;font-family:inherit;
}
.cat-ni:focus{border-color:#555}
#settings-close{
  margin-top:auto;
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);
  border-radius:10px;padding:12px;
  cursor:pointer;font-size:.82rem;font-weight:600;
  transition:color .15s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
#settings-close:active{color:var(--tx)}
.sdiv{border:none;border-top:1px solid var(--bd);margin:16px 0}

/* ───────────────────────────────────────────
   CURRENT TIME LINE
─────────────────────────────────────────── */
.now-line{
  position:absolute;left:0;right:0;height:2px;
  background:#e53935;z-index:5;pointer-events:none;
}
.now-dot{
  position:absolute;left:-4px;top:-4px;
  width:10px;height:10px;background:#e53935;border-radius:50%;
}

/* ───────────────────────────────────────────
   SCROLLBAR
─────────────────────────────────────────── */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- ═══════════ TOP BAR ═══════════ -->
<div id="topbar">

  <!-- Row 1: navigation + settings -->
  <div id="topbar-row1">
    <button class="nav-btn" id="prev-btn" aria-label="Previous">‹</button>
    <span id="nav-title">Loading…</span>
    <button class="nav-btn" id="next-btn" aria-label="Next">›</button>
    <button id="settings-btn" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Row 2: view switcher + Today -->
  <div id="topbar-row2">
    <div id="view-switcher">
      <button class="view-btn" data-view="month">Month</button>
      <button class="view-btn" data-view="week">Week</button>
      <button class="view-btn" data-view="day">Day</button>
    </div>
    <button id="today-btn">Today</button>
  </div>

</div>

<!-- ═══════════ VIEWS ═══════════ -->
<div id="calendar-container">

  <!-- MONTH VIEW (continuous scroll) -->
  <div id="month-view">
    <div id="dow-header">
      <div class="dow-cell">Sun</div>
      <div class="dow-cell">Mon</div>
      <div class="dow-cell">Tue</div>
      <div class="dow-cell">Wed</div>
      <div class="dow-cell">Thu</div>
      <div class="dow-cell">Fri</div>
      <div class="dow-cell">Sat</div>
    </div>
    <div id="month-scroll"></div>
  </div>

  <!-- WEEK VIEW -->
  <div id="week-view" class="hidden">
    <div id="week-header"><div></div></div>
    <div id="week-body"><div id="week-grid"></div></div>
  </div>

  <!-- DAY VIEW -->
  <div id="day-view" class="hidden">
    <div id="day-hdr">
      <div class="dbig" id="day-big"></div>
      <div class="dsub" id="day-sub"></div>
    </div>
    <div id="day-body"><div id="day-grid"></div></div>
  </div>

</div>

<!-- ═══════════ BOTTOM BAR ═══════════ -->
<div id="bottom-bar">
  <div id="mic-area">
    <div id="transcript-bubble"></div>
    <button id="mic-btn" aria-label="Voice input">
      <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </button>
  </div>
</div>

<!-- ═══════════ EVENT MODAL ═══════════ -->
<div class="overlay hidden" id="event-overlay">
  <div class="modal">
    <button class="close-btn" id="ev-close">✕</button>
    <h2 id="modal-title">New Event</h2>
    <div class="fg">
      <label>Title</label>
      <input type="text" id="ev-title" placeholder="Event name…">
    </div>
    <div class="fg">
      <label>Category</label>
      <select id="ev-cat"></select>
    </div>
    <div class="frow">
      <div class="fg"><label>Start date</label><input type="date" id="ev-date"></div>
      <div class="fg"><label>End date</label><input type="date" id="ev-enddate"></div>
    </div>
    <div class="allday-row">
      <input type="checkbox" id="ev-allday">
      <label for="ev-allday">All day</label>
    </div>
    <div class="frow" id="time-fields">
      <div class="fg"><label>Start time</label><input type="time" id="ev-start"></div>
      <div class="fg"><label>End time</label><input type="time" id="ev-end"></div>
    </div>
    <div class="modal-actions">
      <div><button class="btn btn-danger hidden" id="ev-del">Delete</button></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" id="ev-cancel">Cancel</button>
        <button class="btn btn-primary" id="ev-save">Save</button>
      </div>
    </div>

</div>

<!-- ═══════════ SETTINGS PANEL ═══════════ -->
<div id="settings-panel">
  <h3>Settings</h3>
  <p class="ssub">Tap a swatch to change colour</p>
  <div class="stitle">Categories</div>
  <div id="cat-list"></div>
  <hr class="sdiv">
  <button id="settings-close">Close</button>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

// Multilingual month map (EN + DE + FR + NL + LU)
const MONTH_MAP = {
  // English
  january:0,february:1,march:2,april:3,may:4,june:5,
  july:6,august:7,september:8,october:9,november:10,december:11,
  jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11,
  // German
  januar:0,februar:1,'märz':2,maerz:2,mai:4,juni:5,juli:6,
  oktober:9,dezember:11,
  // French
  janvier:0,'février':1,fevrier:1,mars:2,avril:3,juin:5,juillet:6,
  'août':7,aout:7,septembre:8,octobre:9,'décembre':11,decembre:11,
  // Dutch
  januari:0,februari:1,maart:2,mei:4,augustus:7,
  // Luxembourgish
  'mäerz':2,maerz2:2,'abrëll':3,abrell:3,mee:4,
};

// Multilingual day-name map → 0=Sun..6=Sat
const DAY_MAP = {
  // English
  sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,
  sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6,
  // German
  sonntag:0,montag:1,dienstag:2,mittwoch:3,donnerstag:4,freitag:5,samstag:6,
  so:0,mo:1,di:2,mi:3,do:4,fr:5,sa:6,
  // French
  dimanche:0,lundi:1,mardi:2,mercredi:3,jeudi:4,vendredi:5,samedi:6,
  // Dutch
  zondag:0,maandag:1,dinsdag:2,woensdag:3,donderdag:4,vrijdag:5,zaterdag:6,
  // Luxembourgish
  sonndag:0,'méindeg':1,meindeg:1,'dënschdeg':2,denschdeg:2,
  'mëttwoch':3,mettwoch:3,donneschdeg:4,freideg:5,samschdeg:6,
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let state = {
  view:'month',
  cursor:new Date(),
  events:[],
  categories:{
    personal:{name:'Personal',color:'#22c55e'},
    health:  {name:'Health',  color:'#f97316'},
    travel:  {name:'Travel',  color:'#14b8a6'},
    uni:     {name:'Uni',     color:'#a855f7'},
  },
  editingId:null,
};

// ═══════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════
function save(){
  try{
    localStorage.setItem('cal_ev', JSON.stringify(state.events));
    localStorage.setItem('cal_ca', JSON.stringify(state.categories));
  }catch(_){}
}
function load(){
  try{
    const e=localStorage.getItem('cal_ev');
    const c=localStorage.getItem('cal_ca');
    if(e) state.events=JSON.parse(e);
    if(c) state.categories=JSON.parse(c);
  }catch(_){}
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function tdk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function pld(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function todayKey(){return tdk(new Date());}
function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function cc(id){return (state.categories[id]||Object.values(state.categories)[0]).color;}
function abbr(text,n){return text.length<=n?text:text.slice(0,n-1)+'…';}

function eventsOn(key){
  return state.events.filter(e=>{
    if(e.endDate&&e.endDate>e.date) return e.date<=key&&key<=e.endDate;
    return e.date===key;
  }).sort((a,b)=>{
    const as=a.endDate&&a.endDate>a.date, bs=b.endDate&&b.endDate>b.date;
    if(as&&!bs)return -1; if(!as&&bs)return 1;
    if(a.allDay&&!b.allDay)return -1; if(!a.allDay&&b.allDay)return 1;
    return (a.start||'').localeCompare(b.start||'');
  });
}

function applyColors(){
  for(const[id,c] of Object.entries(state.categories))
    document.documentElement.style.setProperty(`--cat-${id}`,c.color);
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  applyColors();
  updateNavTitle();
  updateViewBtns();
  if(state.view==='month')       renderMonth();
  else if(state.view==='week')   renderWeek();
  else                           renderDay();
}

function updateNavTitle(){
  const c=state.cursor;
  if(state.view==='month'){
    document.getElementById('nav-title').textContent=`${MONTHS[c.getMonth()]} ${c.getFullYear()}`;
  } else if(state.view==='week'){
    const sun=weekStart(c), sat=new Date(sun); sat.setDate(sat.getDate()+6);
    document.getElementById('nav-title').textContent=
      sun.getMonth()===sat.getMonth()
        ?`${MONTHS[sun.getMonth()]} ${sun.getDate()}–${sat.getDate()}, ${sun.getFullYear()}`
        :`${MONTHS[sun.getMonth()].slice(0,3)} ${sun.getDate()} – ${MONTHS[sat.getMonth()].slice(0,3)} ${sat.getDate()}`;
  } else {
    document.getElementById('nav-title').textContent=
      `${DAYS[c.getDay()]}, ${MONTHS[c.getMonth()]} ${c.getDate()}`;
  }
}

function updateViewBtns(){
  document.querySelectorAll('.view-btn').forEach(b=>
    b.classList.toggle('active', b.dataset.view===state.view)
  );
  ['month','week','day'].forEach(v=>
    document.getElementById(`${v}-view`).classList.toggle('hidden', state.view!==v)
  );
}

// ═══════════════════════════════════════════
//  MONTH VIEW — continuous scroll
// ═══════════════════════════════════════════
let monthScrollInit=false, monthObserver=null;

function renderMonth(){
  const scroll=document.getElementById('month-scroll');
  if(!monthScrollInit){
    buildMonthScroll(scroll);
    monthScrollInit=true;
  } else {
    refreshMonthEvents(scroll);
  }
  scrollToMonth(state.cursor.getFullYear(), state.cursor.getMonth());
}

function buildMonthScroll(scroll){
  scroll.innerHTML='';
  const now=new Date();
  const start=new Date(now.getFullYear(), now.getMonth()-15, 1);
  const end  =new Date(now.getFullYear(), now.getMonth()+25, 1);
  let cur=new Date(start);
  while(cur<end){
    scroll.appendChild(buildMonthSection(cur.getFullYear(), cur.getMonth()));
    cur.setMonth(cur.getMonth()+1);
  }
  if(monthObserver) monthObserver.disconnect();
  monthObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting && e.intersectionRatio>0.3){
        const{y,m}=e.target.dataset;
        document.getElementById('nav-title').textContent=`${MONTHS[+m]} ${y}`;
        state.cursor=new Date(+y, +m, 1);
      }
    });
  },{root:scroll, threshold:0.3});
  scroll.querySelectorAll('.month-section').forEach(s=>monthObserver.observe(s));
}

function buildMonthSection(year, month){
  const todayK=todayKey(), now=new Date();
  const isCurrentMonth=(year===now.getFullYear()&&month===now.getMonth());
  const section=document.createElement('div');
  section.className='month-section';
  section.dataset.y=year; section.dataset.m=month;
  const title=document.createElement('div');
  title.className='month-section-title'+(isCurrentMonth?' current-month':'');
  title.textContent=`${MONTHS[month]} ${year}`;
  section.appendChild(title);
  const grid=document.createElement('div');
  grid.className='month-grid';
  grid.dataset.y=year; grid.dataset.m=month;
  const first=new Date(year,month,1), offset=first.getDay();
  for(let i=0;i<42;i++){
    const d=new Date(first); d.setDate(1-offset+i);
    const key=tdk(d), isOther=(d.getMonth()!==month), isToday=(key===todayK);
    const cell=document.createElement('div');
    cell.className='day-cell'+(isOther?' other-month':'')+(isToday?' today':'');
    cell.dataset.date=key;
    const num=document.createElement('div');
    num.className='day-num'; num.textContent=d.getDate();
    cell.appendChild(num);
    cell.addEventListener('click',()=>openNewModal(key));
    fillCellEvents(cell, key);
    grid.appendChild(cell);
  }
  section.appendChild(grid);
  return section;
}

function fillCellEvents(cell, key){
  Array.from(cell.children).forEach(c=>{if(!c.classList.contains('day-num'))c.remove();});
  const evs=eventsOn(key);
  const MAX=3; let shown=0;
  evs.forEach(ev=>{
    if(shown>=MAX)return; shown++;
    const col=cc(ev.category);
    const isMulti=ev.endDate&&ev.endDate>ev.date;
    if(isMulti){
      const isStart=ev.date===key, isEnd=ev.endDate===key;
      const bar=document.createElement('div');
      bar.className='event-span '+(isStart&&isEnd?'span-single':isStart?'span-start':isEnd?'span-end':'');
      bar.style.background=rgba(col,.3); bar.style.color=col;
      const show=isStart||pld(key).getDay()===0;
      bar.textContent=show?abbr(ev.title,10):'';
      bar.title=ev.title;
      bar.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);});
      cell.appendChild(bar);
    } else {
      const pill=document.createElement('div');
      pill.className='event-pill';
      pill.style.background=rgba(col,.25); pill.style.color=col;
      const timeStr=ev.allDay?'':(ev.start?ev.start.slice(0,5)+' ':'');
      pill.textContent=timeStr+abbr(ev.title,12);
      pill.title=ev.title;
      pill.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);});
      cell.appendChild(pill);
    }
  });
  if(evs.length>MAX){
    const m=document.createElement('div');
    m.className='more-badge'; m.textContent=`+${evs.length-MAX}`;
    cell.appendChild(m);
  }
}

function refreshMonthEvents(scroll){
  scroll.querySelectorAll('.day-cell').forEach(cell=>{
    fillCellEvents(cell, cell.dataset.date);
  });
}

function scrollToMonth(year, month){
  const scroll=document.getElementById('month-scroll');
  const section=scroll.querySelector(`.month-section[data-y="${year}"][data-m="${month}"]`);
  if(section) section.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════
//  WEEK VIEW
// ═══════════════════════════════════════════
function weekStart(d){
  const s=new Date(d); s.setDate(d.getDate()-d.getDay()); s.setHours(0,0,0,0); return s;
}

function renderWeek(){
  const sun=weekStart(state.cursor), today=todayKey(), now=new Date();
  const hdr=document.getElementById('week-header');
  while(hdr.children.length>1) hdr.removeChild(hdr.lastChild);
  for(let i=0;i<7;i++){
    const d=new Date(sun); d.setDate(d.getDate()+i);
    const dh=document.createElement('div');
    dh.className='wdh'+(tdk(d)===today?' today':'');
    dh.innerHTML=`<div class="wdn">${DAYS[d.getDay()]}</div><div class="wdd">${d.getDate()}</div>`;
    hdr.appendChild(dh);
  }
  const grid=document.getElementById('week-grid'); grid.innerHTML='';
  for(let h=0;h<24;h++){
    const l=document.createElement('div'); l.className='tlbl';
    l.textContent=h===0?'':`${String(h).padStart(2,'0')}:00`;
    grid.appendChild(l);
    for(let d=0;d<7;d++){
      const day=new Date(sun); day.setDate(day.getDate()+d);
      const key=tdk(day), s=document.createElement('div');
      s.className='wslot'; s.dataset.date=key; s.dataset.hour=h;
      s.addEventListener('click',()=>openNewModal(key,`${String(h).padStart(2,'0')}:00`));
      grid.appendChild(s);
    }
  }
  for(let d=0;d<7;d++){
    const day=new Date(sun); day.setDate(day.getDate()+d);
    eventsOn(tdk(day)).forEach(ev=>{
      const key=tdk(day);
      if(ev.allDay||!ev.start){
        const s=grid.querySelector(`.wslot[data-date="${key}"][data-hour="0"]`); if(!s)return;
        const el=document.createElement('div'); el.className='wev';
        el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
        el.style.top='2px'; el.style.height='40px'; el.textContent=abbr(ev.title,16);
        el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el); return;
      }
      const[sh,sm]=ev.start.split(':').map(Number);
      let em=sh*60+sm+60; if(ev.end){const[eh,em2]=ev.end.split(':').map(Number);em=eh*60+em2;}
      const s=grid.querySelector(`.wslot[data-date="${key}"][data-hour="${sh}"]`); if(!s)return;
      const el=document.createElement('div'); el.className='wev';
      el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
      el.style.top=(sm/44*44)+'px'; el.style.height=Math.max((em-sh*60-sm)/60*44-3,16)+'px';
      el.textContent=`${ev.start} ${abbr(ev.title,14)}`;
      el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el);
    });
  }
  const ti=[...Array(7)].map((_,i)=>{const d=new Date(sun);d.setDate(d.getDate()+i);return tdk(d);}).indexOf(today);
  if(ti>=0){
    const sl=grid.querySelectorAll(`.wslot[data-hour="${now.getHours()}"]`);
    if(sl[ti]){
      const ln=document.createElement('div'); ln.className='now-line';
      ln.style.top=(now.getMinutes()/60*44)+'px'; ln.innerHTML='<div class="now-dot"></div>'; sl[ti].appendChild(ln);
    }
  }
  setTimeout(()=>{document.getElementById('week-body').scrollTop=8*44;},0);
}

// ═══════════════════════════════════════════
//  DAY VIEW
// ═══════════════════════════════════════════
function renderDay(){
  const c=state.cursor, key=tdk(c), today=todayKey(), now=new Date();
  const full=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('day-big').textContent=`${full[c.getDay()]}, ${MONTHS[c.getMonth()]} ${c.getDate()}`;
  document.getElementById('day-sub').textContent=key===today?'Today':`${c.getFullYear()}`;
  const grid=document.getElementById('day-grid'); grid.innerHTML='';
  for(let h=0;h<24;h++){
    const l=document.createElement('div'); l.className='tlbl';
    l.textContent=h===0?'':`${String(h).padStart(2,'0')}:00`;
    grid.appendChild(l);
    const s=document.createElement('div'); s.className='dslot'; s.dataset.hour=h;
    s.addEventListener('click',()=>openNewModal(key,`${String(h).padStart(2,'0')}:00`));
    grid.appendChild(s);
  }
  eventsOn(key).forEach(ev=>{
    if(ev.allDay||!ev.start){
      const s=grid.querySelector('.dslot[data-hour="0"]'); if(!s)return;
      const el=document.createElement('div'); el.className='dev';
      el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
      el.style.top='4px'; el.style.height='38px'; el.textContent=ev.title;
      el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el); return;
    }
    const[sh,sm]=ev.start.split(':').map(Number);
    let em=sh*60+sm+60; if(ev.end){const[eh,em2]=ev.end.split(':').map(Number);em=eh*60+em2;}
    const s=grid.querySelector(`.dslot[data-hour="${sh}"]`); if(!s)return;
    const el=document.createElement('div'); el.className='dev';
    el.style.background=rgba(cc(ev.category),.3); el.style.color=cc(ev.category);
    el.style.top=(sm/60*44+2)+'px'; el.style.height=Math.max((em-sh*60-sm)/60*44-3,16)+'px';
    el.textContent=`${ev.start} ${ev.title}`;
    el.addEventListener('click',e=>{e.stopPropagation();openEditModal(ev.id);}); s.appendChild(el);
  });
  if(key===today){
    const s=grid.querySelector(`.dslot[data-hour="${now.getHours()}"]`);
    if(s){
      const ln=document.createElement('div'); ln.className='now-line';
      ln.style.top=(now.getMinutes()/60*44)+'px'; ln.innerHTML='<div class="now-dot"></div>'; s.appendChild(ln);
    }
  }
  setTimeout(()=>{document.getElementById('day-body').scrollTop=8*44;},0);
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function populateCat(sel){
  const el=document.getElementById('ev-cat'); el.innerHTML='';
  for(const[id,c] of Object.entries(state.categories)){
    const o=document.createElement('option'); o.value=id; o.textContent=c.name;
    if(id===sel) o.selected=true; el.appendChild(o);
  }
}
function openNewModal(dateKey, startTime){
  state.editingId=null;
  document.getElementById('modal-title').textContent='New Event';
  document.getElementById('ev-title').value='';
  document.getElementById('ev-date').value=dateKey;
  document.getElementById('ev-enddate').value='';
  document.getElementById('ev-allday').checked=!startTime;
  document.getElementById('ev-start').value=startTime||'09:00';
  document.getElementById('ev-end').value=startTime
    ?`${String((parseInt(startTime)+1)%24).padStart(2,'0')}:00`:'10:00';
  document.getElementById('time-fields').style.display=startTime?'':'none';
  document.getElementById('ev-del').classList.add('hidden');
  populateCat(Object.keys(state.categories)[0]);
  document.getElementById('event-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('ev-title').focus(),80);
}
function openEditModal(id){
  const ev=state.events.find(e=>e.id===id); if(!ev)return;
  state.editingId=id;
  document.getElementById('modal-title').textContent='Edit Event';
  document.getElementById('ev-title').value=ev.title;
  document.getElementById('ev-date').value=ev.date;
  document.getElementById('ev-enddate').value=ev.endDate||'';
  document.getElementById('ev-allday').checked=!!ev.allDay;
  document.getElementById('ev-start').value=ev.start||'09:00';
  document.getElementById('ev-end').value=ev.end||'10:00';
  document.getElementById('time-fields').style.display=ev.allDay?'none':'';
  document.getElementById('ev-del').classList.remove('hidden');
  populateCat(ev.category);
  document.getElementById('event-overlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('event-overlay').classList.add('hidden');
  state.editingId=null;
}

document.getElementById('ev-allday').addEventListener('change',e=>{
  document.getElementById('time-fields').style.display=e.target.checked?'none':'';
});
document.getElementById('ev-save').addEventListener('click',()=>{
  const title=document.getElementById('ev-title').value.trim();
  if(!title){document.getElementById('ev-title').focus();return;}
  const sd=document.getElementById('ev-date').value;
  const ed=document.getElementById('ev-enddate').value||null;
  const ev={
    id:state.editingId||uid(), title,
    date:sd, endDate:(ed&&ed>sd)?ed:null,
    category:document.getElementById('ev-cat').value,
    allDay:document.getElementById('ev-allday').checked||!!(ed&&ed>sd),
    start:document.getElementById('ev-allday').checked?null:document.getElementById('ev-start').value,
    end:  document.getElementById('ev-allday').checked?null:document.getElementById('ev-end').value,
  };
  state.events=state.editingId
    ?state.events.map(e=>e.id===state.editingId?ev:e)
    :[...state.events,ev];
  save(); closeModal();
  if(state.view==='month') refreshMonthEvents(document.getElementById('month-scroll'));
  else render();
});
document.getElementById('ev-del').addEventListener('click',()=>{
  if(!state.editingId)return;
  state.events=state.events.filter(e=>e.id!==state.editingId);
  save(); closeModal();
  if(state.view==='month') refreshMonthEvents(document.getElementById('month-scroll'));
  else render();
});

// ═══════════════════════════════════════════
//  NLP PARSER — multilingual EN/DE/FR/LU/NL
// ═══════════════════════════════════════════

// Strip words that describe intent but aren't the event title
const NOISE_STRIP=[
  /\b(i will|i'm|im going to|i am|i'll|going to|will be|want to|i go|i travel|i fly)\b/gi,
  /\b(today|tomorrow|yesterday|tonight|this morning|this evening)\b/gi,
  /\b(ich werde|ich gehe|ich fliege|ich fahre|ich bin|werde|gehe|fahre|fliege|komme)\b/gi,
  /\b(heute|morgen|gestern|übermorgen|uebermorgen|nächste|naechste|nächsten|naechsten)\b/gi,
  /\b(nach|zum|zur|am|im|um|von|bis|ab)\b/gi,
  /\b(je vais|je pars|je voyage|je vole|je serai|je suis|vais|pars|voyage)\b/gi,
  /\b(aujourd'hui|demain|hier|après-demain|apres-demain|ce soir|ce matin)\b/gi,
  /\b(au|aux|du|de|en|pour|jusqu'au|jusqu'à|le|la|les|un|une)\b/gi,
  /\b(ech fueren|ech fléien|ech ginn|ech si|fueren|fléien|ginn)\b/gi,
  /\b(haut|muer|gëschter|geschter)\b/gi,
];

// Relative date offset map (multi-language)
const RELATIVE_MAP={
  today:0,tomorrow:1,yesterday:-1,tonight:0,
  heute:0,morgen:1,gestern:-1,übermorgen:2,uebermorgen:2,
  "aujourd'hui":0,"aujourd hui":0,demain:1,hier:-1,"après-demain":2,"apres-demain":2,
  haut:0,muer:1,'gëschter':-1,geschter:-1,
};

const NEXT_WEEK=/\b(next week|nächste woche|naechste woche|la semaine prochaine|d'nächst woch|volgende week)\b/i;
const IN_DAYS  =/\bin (\d+)\s*(?:days?|tagen?|jours?|deeg)\b/i;
const IN_WEEKS =/\bin (\d+)\s*(?:weeks?|wochen?|semaines?)\b/i;
const IN_MONTHS=/\bin (\d+)\s*(?:months?|monaten?|mois|méint|meint)\b/i;

// Event type keyword → English title
const EVENT_TYPE_MAP={
  'arzt':'Doctor appointment','zahnarzt':'Dentist appointment','prüfung':'Exam',
  'klausur':'Exam','vorlesung':'Lecture','seminar':'Seminar','fitnessstudio':'Gym',
  'sport':'Sport','urlaub':'Vacation','geburtstag':'Birthday','besprechung':'Meeting',
  'training':'Training','reise':'Trip','flug':'Flight','hausarbeit':'Assignment',
  'konzert':'Concert','party':'Party',
  'médecin':'Doctor appointment','medecin':'Doctor appointment',
  'dentiste':'Dentist appointment','examen':'Exam','cours':'Lecture',
  'vacances':'Vacation','anniversaire':'Birthday','réunion':'Meeting',
  'reunion':'Meeting','voyage':'Trip','vol':'Flight','concert':'Concert',
  'fête':'Party','fete':'Party','salle de sport':'Gym',
  'dokter':'Doctor appointment','douteur':'Doctor appointment',
  'vakanz':'Vacation','gebuertsdag':'Birthday','reunioun':'Meeting',
  'reese':'Trip','fluch':'Flight',
};

// Words that should never become a title
const DATE_NOISE_RE=/^(from|on|at|in|next|this|the|a|an|my|for|until|till|through|and|or|with|to|von|nach|bis|am|um|zu|zur|zum|de|du|au|aux|le|la|les|un|une|en|pour|op|vun|an|ech|ich|je|i)$/i;

function resolveMonthDate(mIdx,day,refYear){
  const d=new Date(refYear,mIdx,day||1);
  const now=new Date(); now.setHours(0,0,0,0);
  if(d<now) d.setFullYear(refYear+1);
  return d;
}

function parseFuzzyDate(phrase,today){
  const p=phrase.toLowerCase().trim()
    .replace(/[éèêë]/g,'e').replace(/[üû]/g,'u').replace(/[äâ]/g,'a')
    .replace(/[öô]/g,'o').replace(/[îï]/g,'i').replace(/ß/g,'ss').replace(/ç/g,'c');
  const yr=today.getFullYear();
  const mName=Object.keys(MONTH_MAP).join('|');
  const mdM=p.match(new RegExp('('+mName+')\\s+(\\d{1,2})(?:st|nd|rd|th|\\.)?'));
  const dmM=p.match(new RegExp('(\\d{1,2})(?:st|nd|rd|th|\\.)?\\s+('+mName+')'));
  if(mdM&&MONTH_MAP[mdM[1]]!==undefined) return resolveMonthDate(MONTH_MAP[mdM[1]],parseInt(mdM[2]),yr);
  if(dmM&&MONTH_MAP[dmM[2]]!==undefined) return resolveMonthDate(MONTH_MAP[dmM[2]],parseInt(dmM[1]),yr);
  for(const[name,idx] of Object.entries(MONTH_MAP)){if(p===name) return resolveMonthDate(idx,1,yr);}
  const ord=p.match(/(?:the\s+)?(\d{1,2})(?:st|nd|rd|th|\.)/);
  if(ord){const d=new Date(today);d.setDate(parseInt(ord[1]));return d;}
  return null;
}

function extractDestination(text){
  const goRe=/\b(?:go(?:ing)?\s+to|travel(?:l?ing)?\s+to|fly(?:ing)?\s+to|trip\s+to|visit(?:ing)?\s+to?|heading\s+to|drive\s+to|flight\s+to|train\s+to|fahren\s+nach|fliegen\s+nach|reise?\s+nach|reisen?\s+nach|fahre\s+nach|vais\s+[aà]|voyage\s+[aà]|pars\s+pour|fueren\s+op|fléien\s+op|ginn\s+op)\s+([A-Za-zÀ-ÿ]+(?:\s+[A-Za-zÀ-ÿ]+)?)/i;
  const m=text.match(goRe);
  if(m){
    const dest=m[1].split(/\s+/).filter(w=>!DATE_NOISE_RE.test(w)).join(' ');
    if(dest&&dest.length>1) return dest;
  }
  const fm=text.match(/\bto\s+([A-ZÀ-Ý][a-zA-ZÀ-ÿ]+)(?:\s|$)/);
  if(fm&&!DATE_NOISE_RE.test(fm[1])) return fm[1];
  return null;
}

function guessCategory(text){
  const t=text.toLowerCase();
  if(/\b(go|going|travel|fly|flying|trip|visit|fahren|fliegen|reisen|vais|voyage|partir|fueren|fléien|ginn)\s+(to|nach|[aà]|op)\b/.test(t)) return 'travel';
  const rules={
    uni:['lecture','class','assignment','exam','study','uni','university','college','deadline',
         'homework','essay','seminar','dissertation','thesis','coursework','module',
         'vorlesung','prüfung','pruefung','hausarbeit','universität','hochschule','klausur',
         'cours','examen','devoir','université','universite','schoul','lycée','lycee'],
    health:['gym','workout','run','yoga','doctor','dentist','appointment','exercise','swim',
            'training','fitness','physio','hospital','medication','jog','cycling','sport','match',
            'arzt','zahnarzt','fitnessstudio','laufen','joggen','krankenhaus',
            'médecin','medecin','dentiste','hôpital','hopital','courir',
            'dokter','douteur'],
    travel:['flight','train','trip','travel','hotel','airport','journey','ferry','holiday',
            'vacation','abroad','depart','arrive','airbnb','hostel','visa','boarding','tour',
            'flug','zug','reise','urlaub','flughafen','bahnhof','ausflug',
            'vol','voyage','vacances','hôtel','aéroport','aeroport',
            'vakanz','fluch','rees'],
  };
  for(const[cat,kws] of Object.entries(rules)){if(kws.some(k=>t.includes(k))) return cat;}
  return 'personal';
}

function parseNLP(rawText){
  // Normalise for matching; keep rawText for display
  const t=rawText.toLowerCase()
    .replace(/[éèêë]/g,'e').replace(/[àâ]/g,'a').replace(/[äæ]/g,'a')
    .replace(/[üûù]/g,'u').replace(/[öô]/g,'o').replace(/[îï]/g,'i')
    .replace(/ß/g,'ss').replace(/ç/g,'c').trim();

  const today=new Date(); today.setHours(0,0,0,0);
  let startDate=new Date(today), endDate=null;
  let tStart=null, tEnd=null, allDay=true;
  let title=rawText.trim();

  // 1. DATE RANGE
  const rangeRe=/\b(?:from|von|vun|du|de)\s+(.+?)\s+(?:to|bis|au|jusqu'au|jusqua|jusqu'a)\s+(.+?)(?:\s+(?:at|um|a|op|in)\b|$)/i;
  const rm=t.match(rangeRe);
  if(rm){
    const d1=parseFuzzyDate(rm[1],today), d2=parseFuzzyDate(rm[2],today);
    if(d1) startDate=d1;
    if(d2&&d1){if(d2<d1)d2.setFullYear(d2.getFullYear()+1);endDate=d2;allDay=true;}
  } else {
    // 2. SINGLE DATE
    let found=false;
    for(const[word,offset] of Object.entries(RELATIVE_MAP)){
      if(new RegExp('\\b'+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(t)){
        startDate.setDate(startDate.getDate()+offset);found=true;break;
      }
    }
    if(!found){
      const id=t.match(IN_DAYS),iw=t.match(IN_WEEKS),im=t.match(IN_MONTHS);
      if(id){startDate.setDate(startDate.getDate()+parseInt(id[1]));found=true;}
      else if(iw){startDate.setDate(startDate.getDate()+parseInt(iw[1])*7);found=true;}
      else if(im){startDate.setMonth(startDate.getMonth()+parseInt(im[1]));found=true;}
    }
    if(!found&&NEXT_WEEK.test(t)){startDate.setDate(startDate.getDate()+7);found=true;}
    if(!found){
      const allDayNames=Object.keys(DAY_MAP).join('|');
      const dm=t.match(new RegExp('\\b(?:next|this|nachsten|naechsten|prochain|prochaine)\\s+('+allDayNames+')\\b'))
             ||t.match(new RegExp('\\b('+allDayNames+')\\b'));
      if(dm){
        const dn=dm[dm.length-1];
        if(DAY_MAP[dn]!==undefined){
          let diff=DAY_MAP[dn]-startDate.getDay();if(diff<=0)diff+=7;
          startDate.setDate(startDate.getDate()+diff);found=true;
        }
      }
    }
    if(!found){
      const fd=parseFuzzyDate(t.replace(/\b(?:at|um|a)\s+\d.*$/,'').trim(),today);
      if(fd){startDate=fd;found=true;}
    }
  }

  // 3. TIME
  if(!endDate){
    const tm=t.match(/\b(?:at|um|a)\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm|uhr)?/i);
    if(tm){
      let h=parseInt(tm[1]);const m2=parseInt(tm[2]||'0'),ap=(tm[3]||'').toLowerCase();
      if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;
      if(!ap&&h<8)h+=12;
      tStart=`${String(h).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
      tEnd=`${String((h+1)%24).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
      allDay=false;
    }
    if(allDay){
      const fz={
        morning:['08:00','09:00'],morgen:['08:00','09:00'],matin:['08:00','09:00'],moien:['08:00','09:00'],
        afternoon:['13:00','14:00'],nachmittag:['13:00','14:00'],nometteg:['13:00','14:00'],
        evening:['18:00','19:00'],abend:['18:00','19:00'],soir:['18:00','19:00'],owend:['18:00','19:00'],
        night:['20:00','21:00'],nacht:['20:00','21:00'],nuit:['20:00','21:00'],nuecht:['20:00','21:00'],
        noon:['12:00','13:00'],mittag:['12:00','13:00'],midi:['12:00','13:00'],metteg:['12:00','13:00'],
      };
      for(const[w,[s,e]] of Object.entries(fz)){
        if(t.includes(w)){tStart=s;tEnd=e;allDay=false;break;}
      }
    }
  }

  // 4. TITLE
  const dest=extractDestination(rawText);
  if(dest){
    title=dest;
  } else {
    const tLow=rawText.toLowerCase();
    let mapped=null;
    for(const[kw,en] of Object.entries(EVENT_TYPE_MAP)){
      if(tLow.includes(kw)){mapped=en;break;}
    }
    if(mapped){
      title=mapped;
    } else {
      for(const r of NOISE_STRIP) title=title.replace(r,' ');
      const mName=Object.keys(MONTH_MAP).join('|');
      const strips=[
        /\bfrom\s+\S.*?\b(?:to|until|till|through|bis|au|jusqu'au)\s+\S+/gi,
        /\bvon\s+\S.*?\bbis\s+\S+/gi,
        /\bin \d+ (?:days?|tagen?|jours?|weeks?|wochen?|semaines?|months?|monaten?|mois)\b/gi,
        new RegExp('\\b('+mName+')\\s+\\d{1,2}(?:st|nd|rd|th|\\.)?\\b','gi'),
        new RegExp('\\b\\d{1,2}(?:st|nd|rd|th|\\.)?\\s+('+mName+')\\b','gi'),
        /\b(?:at|um|a)\s+\d{1,2}(?::\d{2})?\s*(?:am|pm|uhr)?\b/gi,
        /\b(?:morning|afternoon|evening|night|noon|morgen|abend|mittag|nachmittag|nacht|matin|midi|soir|nuit|moien|metteg|owend|nuecht|nometteg)\b/gi,
        /\b(?:next|this|nächste|naechste|prochain|prochaine)\s+(?:week|woche|semaine|woch)\b/gi,
        new RegExp('\\b('+Object.keys(DAY_MAP).join('|')+')\\b','gi'),
        new RegExp('\\b('+Object.keys(RELATIVE_MAP).map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','gi'),
      ];
      for(const r of strips) title=title.replace(r,' ');
      title=title.replace(/\s+/g,' ').trim()||rawText.trim();
    }
  }
  title=title.charAt(0).toUpperCase()+title.slice(1);

  return{
    title, date:tdk(startDate), endDate:endDate?tdk(endDate):null,
    category:guessCategory(rawText), allDay:allDay||!!endDate,
    start:tStart, end:tEnd,
  };
}

// ═══════════════════════════════════════════
//  VOICE INPUT
//  Key fixes:
//   • NO recognition.lang → uses device language → proper
//     multilingual transcription by iOS/Chrome
//   • iOS stops recognition automatically (no true continuous);
//     onend restarts if still "listening" and no result yet
//   • 1.5s silence timer auto-confirms after speech pauses
// ═══════════════════════════════════════════
const micBtn=document.getElementById('mic-btn');
const bubble=document.getElementById('transcript-bubble');
let recognition=null, isListening=false;
let silTimer=null, latestFinal='', latestInterim='';
const SILENCE_MS=1500;

function showB(t){bubble.textContent=t;bubble.classList.add('visible');}
function hideB(){bubble.classList.remove('visible');}
function armSilence(){
  clearTimeout(silTimer);
  silTimer=setTimeout(()=>{if(isListening&&recognition)recognition.stop();},SILENCE_MS);
}
function disarmSilence(){clearTimeout(silTimer);silTimer=null;}

if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();

  // ⚠️ Do NOT set recognition.lang — let the device use its own language.
  // This is crucial for multilingual (DE/FR/LU/EN) to transcribe correctly.
  // Our NLP handles translation to English afterwards.
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;

  recognition.onstart=()=>{
    isListening=true;
    micBtn.classList.add('listening');
    showB('Listening…');
  };

  recognition.onspeechstart=()=>{
    disarmSilence();
    showB(latestFinal||latestInterim||'Listening…');
  };

  recognition.onresult=e=>{
    latestFinal='';latestInterim='';
    for(const r of e.results){
      if(r.isFinal) latestFinal+=r[0].transcript;
      else latestInterim+=r[0].transcript;
    }
    showB(latestFinal||latestInterim||'…');
    disarmSilence(); // reset while speaking
  };

  // Arm stop timer once speech ends
  recognition.onspeechend=()=>armSilence();

  recognition.onerror=e=>{
    disarmSilence();
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      isListening=false;
      micBtn.classList.remove('listening');
      showB('Microphone access denied');setTimeout(hideB,3000);
    } else if(e.error==='aborted'||e.error==='no-speech'){
      // iOS aborts frequently — handled in onend
    } else {
      isListening=false;
      micBtn.classList.remove('listening');
      showB('Try again');setTimeout(hideB,2000);
    }
  };

  recognition.onend=()=>{
    disarmSilence();
    const text=latestFinal||latestInterim;

    if(text){
      // Got speech — process it
      const saved=text;
      latestFinal='';latestInterim='';
      isListening=false;
      micBtn.classList.remove('listening');
      hideB();
      prefill(saved);
    } else if(isListening){
      // iOS auto-stopped without result (short silence) — restart
      try{recognition.start();}
      catch(_){
        isListening=false;
        micBtn.classList.remove('listening');
        hideB();
      }
    } else {
      isListening=false;
      micBtn.classList.remove('listening');
      hideB();
    }
  };

  micBtn.addEventListener('click',()=>{
    if(isListening){
      // Manual stop
      disarmSilence();
      isListening=false; // prevent auto-restart in onend
      recognition.stop();
    } else {
      latestFinal='';latestInterim='';
      try{recognition.start();}catch(_){}
    }
  });

} else {
  // Fallback: text prompt
  micBtn.title='Type event';
  micBtn.addEventListener('click',()=>{
    const t=prompt('Describe your event:\ne.g. "Doctor appointment tomorrow at 10am"\nor "I go to Utrecht from May 30 to June 1"');
    if(t) prefill(t);
  });
}


function prefill(text){
  const p=parseNLP(text);
  state.editingId=null;
  document.getElementById('modal-title').textContent='New Event';
  document.getElementById('ev-title').value=p.title;
  document.getElementById('ev-date').value=p.date;
  document.getElementById('ev-enddate').value=p.endDate||'';
  document.getElementById('ev-allday').checked=p.allDay;
  document.getElementById('ev-start').value=p.start||'09:00';
  document.getElementById('ev-end').value=p.end||'10:00';
  document.getElementById('time-fields').style.display=p.allDay?'none':'';
  document.getElementById('ev-del').classList.add('hidden');
  populateCat(p.category);
  document.getElementById('event-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('ev-title').focus(),80);
}

        self.skipWaiting();
      });
      self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
      self.addEventListener('fetch',e=>{
        e.respondWith(
          caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./')))
        );
      });
    `;
    navigator.serviceWorker.register(
      URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))
    ).catch(()=>{});
  }
})();
</script>
